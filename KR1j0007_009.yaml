body:
  text: 釋名第八卷釋疾病第二十六疾病者客氣中人急疾也病並也並與正氣在膚體中也疹診也有結氣可得診見也疚久也久在體中也痛通也通在膚脈中也癢揚也其氣在皮中欲得發揚使人搔發之而揚出也眩懸也目視動亂如懸物搖搖然不定也歷從鼻中出歷歷然也禿無髮沐禿也毼頭生創也頭有創曰瘍毼亦然也肓茫也茫茫無所見也瞽鼓也瞑瞑然目平合如鼓皮也矇有眸子而失明蒙蒙無所別也瞍縮也眸子縮壞也瞎迮也膚慕迮迫也眸子明而不正曰通視言通達目匡一方也又謂之麗視麗離也言一目視天一目視地目明分離所視不同也目匡陷急曰眇眇小也目眥傷赤曰䁾䁾末也創在目兩末也目生膚入眸子曰浸浸侵也言侵明也亦言浸淫轉大也聾籠也如在蒙籠之內聽不察也鼻塞曰鼽鼽久也涕久不通遂至窒塞也齲朽也蟲齧之齒缺朽也瘖唵也唵然無聲也癭嬰也在頸嬰喉下也癰喉氣著喉中不通蓄成癰也消㵣㵣渴也腎氣不周於胸胃中津潤消渴故欲得水也嘔傴也將有所吐脊曲傴也咳刻也氣奔至出入不平調若刻物也喘湍也湍疾也氣出入湍疾也吐瀉也故揚豫以東謂瀉為吐也乳癰曰妬妬褚也氣積褚不通至腫潰也心痛曰疝疝詵也氣詵詵然上而痛也痞否也氣否結也小兒氣結曰哺哺露也哺而寒露乳食不消生此疾也注病一人死一人復得氣相灌注也泄利言其出漏泄而利也下重而赤白曰㿃言厲㿃而難也陰腫曰隤氣下隤也又曰疝亦言詵也詵詵引小腹急痛也疼痺也氣疼疼然煩也痔食也蟲食之也酸遜也遜遁在後也言腳疼力少行道在後似遜遁者也消削也如見割削筋力弱也懈解也骨節解緩也厥逆氣從下厥起上行入心脅也瘧酷虐也凡疾或寒或熱耳而此疾先寒後熱兩疾似酷虐者也疥齘也癢搔之齒䫴齘也癬徙也浸淫移徙處日廣也故青徐謂癬為徙也疹展也癢搔之捷展起也腫鍾也寒熱氣所鍾聚也癰壅也氣壅否結裹而潰也痳懍也小便難懍懍然也創戕也戕毀體使傷也痍侈也侈開皮膚為創也瘢漫也生漫故皮也痕根也急相根引也瘤流也血流聚所生瘤腫也贅屬也橫生一肉屬著體也疣丘也出皮上聚高如地之有丘也釋喪制第二十七人始氣絶曰死死澌也就消澌也士曰不祿不復食祿也大夫曰卒言卒竟也諸侯曰薨薨壞之聲也天子曰崩崩壞之形也如山崩然也殪翳也就隱翳也徂落徂祚也福祚殞落也徂亦往也言往去落也罪人曰殺殺竄也埋竄之使不復見也罪及餘人曰誅誅株也如株木根枝葉盡落也死於水者曰溺溺弱也不能自勝之言也死於火者曰燒燒燋也戰死曰兵言死為兵所傷也下殺上曰弒弒伺也伺間而後得施也懸繩曰縊縊厄也厄其頸也屈頸閉氣曰雉經如雉之為也獄死曰考竟考得其情竟其命於獄也市死曰棄市市衆所聚言與衆人共棄之也斫頭曰斬斬腰曰腰斬斬暫也暫加兵即斷也車裂曰轘轘散也肢體分散也煮之於鑊曰烹若烹禽獸之肉也槌而死曰掠掠狼也用威大暴如豺狼也老死曰壽終壽久也終盡也生已久遠氣終盡也少壯而死曰夭如取物中夭折也未二十而死曰殤殤傷也可哀傷也父死曰考考成也亦言槁也槁於義為成凡五材膠漆陶冶皮革乾槁乃成也母死曰妣妣比也比之於父亦然也漢以來謂死為物故言其諸物皆就朽故也既定死曰尸尸舒也骨節解舒不復能自勝斂也衣尸曰襲襲匝也以衣周匝覆衣之也以囊韜其形曰冒覆冒其形使人勿惡也已衣所以束之曰絞襟絞交也交結之也襟禁也禁繫之也含以珠貝含其口中也握以物著尸手中使握之也衣尸棺曰斂斂藏不復見也棺關也言關閉也槨廓也廓落在表之言也尸已在棺曰柩柩究也送終隨身之制皆究備也於西壁下塗之曰殯殯賓也賓客遇之言稍遠也塗曰攢攢木於上而塗之也三日不生生者成服曰縗縗摧也言傷摧也絰實也傷摧之實也絞帶絞麻繩為帶也三年之縗曰斬不緝其末直翦斬而已期曰𪗋𪗋齊也九月曰大功其布加粗大之功不善治練之也五月曰小功精細之功小有飾也三月曰緦麻緦絲也績麻細如絲也錫縗錫易也治其麻使滑易也疑縗疑擬也擬於吉也繐細如繐也疏疏如繐也環絰末無餘散麻圓如環也辨絰如爵辨而素加絰也重死者之資重也含餘米以為粥投之甕而懸之比葬未作主權以重主其神也葬藏也壙曠也藏於空曠處也輿棺之車曰轜轜耳也懸於左右前後銅魚搖絞之屬耳耳然也其蓋曰柳柳聚也衆飾所聚也亦言其形僂也亦曰鱉甲似鱉甲然也其旁曰牆似屋牆也翣齊人謂扇為翣此似之也象翣扇為清涼也翣有黼有畫各以其飾名之也兩旁引之曰披披擺也各於一旁引擺之備傾倚也從前引之曰紼紼發也發車使前也懸下壙曰繂繂捋也徐徐捋下之也棺束曰緘緘函也古者棺不釘也旁際曰小要其要約小也又謂之袵袵任也任制祭會使不解也送死之器曰明器神明之器異於人也塗車以泥塗為車也芻靈束草為人馬以神靈名之也喪祭曰奠奠停也言停久也亦言朴奠合體用之也朔望祭曰殷奠所用殷衆也既葬還祭於殯宮曰虞謂虞樂安神使還此也又祭曰卒哭卒止也止孝子無時之哭朝夕而已也又祭曰祔祭於祖廟以後死孫祔於祖也期而小祥亦祭名也孝子除首絰服練冠也祥善也加小善之飾也又期而大祥亦祭名也孝子除縗服服朝服縞冠如大善之飾也間月而禫亦祭名也孝子之意淡然哀思益衰也冢腫也象山頂之高腫起也墓慕也孝子思慕之處也丘象丘形也陵亦然也假葬於道側曰肂肂翳也日月未滿而葬曰渴言謂欲速葬無恩也過時而不葬曰慢謂慢傲不念早安神也葬不如禮曰埋埋痗也趨使葬腐而已也不得埋之曰棄謂棄之於野也不得其尸曰捐捐於他邊者也
