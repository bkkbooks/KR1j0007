body:
  text: 釋名第二卷釋州國第七青州在東取物生而青也州注也郡國所注仰也徐州徐舒也土氣舒緩也楊州州界多水水波揚也荊州取名於荊山也必取荊為名者荊警也南蠻數為寇逆其民有道後服無道先強常警備之也豫州地在九州之中京師東都所在常安豫也涼州西方所在寒涼也雍州在四山之內雍翳也并州并兼并也其州或并或設故因以為名也幽州在北幽昧之地也冀州亦取地以為名也其地有險有易帝王所都亂則冀治弱則冀強荒則冀豐也兗州取兗水以為名也司州司隸校尉所主也益州益厄也所在之地險厄也古有營州齊衛之地於天文屬營室取其名也燕宛也北方沙漠平廣此地在涿鹿山南宛宛然以為國都也宋送也地接淮泗而東南傾以為殷後若云滓穢所在送使隨流東入海也鄭町也其地多平町町然也楚辛也其地蠻多而人性急數有戰爭相爭相害辛楚之禍也周地在岐山之南其山四周也秦津也其地沃衍有津潤也晉進也其土在北有事於中國則進而南也又取晉水以為名其水迅進也趙朝也本小邑朝事於大國也魯魯鈍也國多山水民性朴魯也衛衛也既滅殷立武庚為殷後三監以守衛之也齊齊也地在渤海之南如齊之中也吳虞也太伯讓位而不就歸封之於此虞其志也越夷蠻之國度越禮義無所拘也此十二國上應列宿各以其地及於事宜制此名也至秦改諸侯置郡縣隨其所在山川土形而立其名漢就而因之也河南在河之南也河內河水從岐山而南從雷首而東從談首而北郡在其內也河東在河水東也河西在河水西也上黨黨所也在山上其所最高故曰上也潁川因潁水以為名也汝南在汝水南也汝陰在汝水陰也東郡南郡皆以京師方面言之也北海海在其北也西海海在其西也南海在海南也宜言海南欲同四海名故言南海東海海在其東也濟南濟水在其南也濟北濟水在其北也義亦如南海也濟陰在濟水之陰也南陽在國之南而地陽也凡若此類郡國之名取號於此則其餘可知也縣邑之名亦如之大曰邦邦封也封有功於是也國城曰都都者國君所居人所都會也周制九夫為井其制似井字也四井為邑邑猶俋也邑人聚會之稱也四邑為丘丘聚也四丘為甸甸乘也出兵車一乘也鄙否也小邑不能遠通也縣懸也懸係於郡也郡群也人所群聚也五家為伍以五為名也又謂之鄰鄰連也相接連也又曰比相親比也五鄰為里居方一里之中也五百家為黨黨長也一聚之所尊長也萬二千五百家為鄉鄉向也衆所向也釋形體第八人仁也仁生物也故易曰立人之道曰仁與義體第也骨肉毛血表裏大小相次第也軀區也是衆名之大揔若區域也形有形象之異也身伸也可屈伸也毛貌也冒也在表所以別形貌且以自覆冒也皮被也被覆體也膚布也布在表也肌懻也膚幕堅懻也骨滑也骨堅而滑也肢枝也似木之枝格也肉柔也筋靳也肉中之力氣之元也靳固於身形也膜幕也幕絡一體也血濊也出於肉流而濊濊也膿醲也汁醲厚也汁涕也涕涕而出也津進也汁進出也汋澤也有潤澤也汗𣵡也出在於表𣵡𣵡然也髓遺也遺瀢也髮拔也拔擢而出也囟峻也所生高峻也髦冒也覆冒頭頸也眉媚也有嫵媚也頭獨也於體高而獨也首始也面漫也額鄂也有垠鄂也故幽州人則謂之鄂也角者生於額角也頞鞍也偃折如鞍也目默也默而內識也眼限也瞳子限限而出也睫插也接也插於眼眶而相接也瞳子瞳重也膚幕相裹重也子小稱也主謂其精明者也或曰眸子眸冒也相裹冒也鼻嘒也出氣嘒嘒也口空也頰夾也兩旁稱也亦取挾斂食物也舌泄也舒泄所當言也齒始也少長之別始乎此也以齒食多者長也食少者幼也牙樝牙也隨形言之也頤養也動於下止於上上下咀物以養人也或曰輔車其骨強所以輔持口也或曰牙車牙所載也或曰頷車頷含也口含物之車也或曰頰車亦所以載物也或曰鼸車鼸鼠之食積於頰人食似之故取名也凡繫於車皆取在下載上物也耳耐也耳有一體屬著兩邊耐耐然也脣緣也口之緣也吻免也入之則碎出則免也又取抆也漱唾所出恆加抆拭因以為名也或曰口卷也可以卷制食物使不落也鼻下曰立人取立於鼻下狹而長似人立也口上曰髭髭姿也為姿容之美也口下曰承漿承水漿也頤下曰鬚鬚秀也物成乃秀人成而鬚生也亦取須體幹長而後生也在頰耳旁曰髯隨口動搖髯髯然也其上連髮曰鬢鬢濱也濱崖也為面額之崖岸也鬢曲頭曰距距矩也言其曲似矩也項確也堅確受枕之處也頸徑也徑挺而長也咽咽物也或謂之䑍在頤下纓理之中也青徐謂之脰物投其中受而下之也又謂之嗌氣所流通厄要之處也胡互也在咽下垂能斂互物也胸猶啌也啌氣所衝也臆猶抑也抑氣所塞也膺壅也氣所壅塞也腹復也富也腸胃之屬以自裹盛復於外復之其中多品似富者也心纖也所識纖微無物不貫也肝幹也五行屬木故其體狀有枝幹也凡物以木為幹也肺勃也言其氣勃鬱也脾禆也在胃下禆助胃氣主化穀也腎引也腎屬水主引水氣灌注諸脈也胃圍也圍受食物也腸暢也通暢胃氣去滓穢也臍劑也腸端之所限劑也自臍以下曰水腹水汋所聚也又曰少腹少小也比於臍以上為小也胞鞄也鞄空虛之言也主以虛承水汋也或曰膀胱言其體短而橫廣也陰蔭也言所在蔭翳也脅挾也在兩旁臂所挾也肋勒也檢勒五臟也膈塞也隔塞上下使氣與穀不相亂也腋繹也言可張翕尋繹也肩堅也甲闔也與胸脅背相會闔也臂禆也在旁曰禆也肘注也可隱注也腕宛也言可宛屈也掌言可以排掌也手須也事業之所須也節有限節也爪紹也筋極為爪紹續指端也背倍也在後稱也脊積也積續骨節終上下也尾微也承脊之末稍微殺也要約也在體之中約結而小也髖緩也其腋皮厚而緩也臂殿也高厚有殿遌也尻廖也尻所在寥牢深也樞機也要髀股動搖如樞機也髀卑也在下稱也股固也為強固也膝伸也可屈伸也腳卻也以其坐時卻在後也脛莖也直而長似物莖也膝頭曰膞膞團也因形團圜而名之也或曰蹁蹁扁也亦因形而名之也足續也言續脛也趾止也言行一進一止也蹄底也足底也踝確也居足兩旁磽確然也亦因其形踝踝然也足後曰跟在下旁著地一體任之象木根也踵鍾也鍾聚也上體之所鍾聚也
