body:
  text: 釋名第五卷釋衣服第十六凡服上曰衣衣依也人所依以芘寒暑也下曰裳裳障也所以自障蔽也領頸也以壅頸也亦言揔領衣體為端首也襟禁也交於前所以禁禦風寒也袂掣也掣開也開張之以受臂屈伸也袪虛也袖由也手所由出入也亦言受也以受手也衿亦禁也禁使不得解散也帶蔕也著於衣如物之繫蔕也系繫也相連繫也衽襜也在旁襜襜然也裾倨也倨倨然直也亦言在後常見踞也玄端玄衣也其幅下正直端方與要接也素積素裳也辟積其要中使踧因以名之也王后之六服有禕衣畫翬雉之文於衣也伊洛而南雉素質五色皆備成章曰翬鷂翟畫鷂雉之文於衣也江淮而南雉青質五采皆備成章曰鷂闕翟翦闕繒為翟雉形以綴衣也鞠衣黃如菊花色也襢衣襢坦也坦然正白無文采也禒衣禒然黑色也韠蔽也所以蔽膝前也婦人蔽膝亦如之齊人謂之巨巾田家婦女出自田野以覆其頭故因以為名也又曰跪襜跪時襜襜然張也佩倍也言其非一物有倍貳也有珠有玉有容刀有帨巾有觿之屬也襦䎡也言溫䎡也袴跨也兩股各跨別也褶襲也覆上之言也襌衣言無裏也䙱屬也衣裳上下相連屬也荊州謂襌衣曰布䙱亦是也襜襦言其襜襜弘裕也褠襌衣之無胡者也言袖夾直形如溝也中衣言在小衣之外大衣之中也裲襠其一當胸其一當背因以名之也帕腹橫帕其腹也抱腹上下有帶抱裹其腹上無襠者也心衣抱腹而施鉤肩鉤肩之閒施一襠以奄心也衫芟也芟末無䄂端也有裏曰複無裏曰單反閉襦之小者也卻向著之領反於背後閉其襟也婦人上服曰袿其下垂者上廣下狹如刀圭也襈撰也青絳為之緣也裙下裳也裙群也連接群幅也緝下橫縫緝其下也緣裙裙施緣也緣䙱䙱施緣也帔披也披之肩背不及下也直領邪直而交下亦如丈夫服袍方也交領就形名之也曲領在內以禁中衣領上橫壅頸其狀曲也單襦如襦而無絮也要襦形如襦其要上翹下齊要也半袖其袂半襦而施袖也留幕冀州所名大褶下至膝者也留牢也幕絡也言牢絡在衣表也袍丈夫著下至跗者也袍苞也苞內衣也婦人以絳作衣裳上下連四起施緣亦曰袍義亦然也齊人謂如衫而小䄂曰侯頭侯頭猶言解瀆臂直通之言也被被也被覆人也衾广也其下廣大如广受人也汗衣近身受汗垢之衣也詩謂之澤受汗澤也或曰鄙袒或曰差袒作之用六尺裁足覆胸背言羞鄙於袒而衣此耳褌貫也貫兩腳上繫要中也幅所以自逼束也今謂之行縢言以裏腳可以跳騰輕便也襪末也在腳末也履禮也飾足所以為禮也複其下曰舄舄腊也行禮久立地或泥濕故複其下使乾腊也屨拘也所以拘足也齊人謂韋屨曰屝屝皮也以皮作之不借言賤易有宜各自蓄之不假借人也齊人云搏腊搏腊猶把鮓麤貌也荊州人曰麤絲麻韋草皆同名也麤措也言所以安措足也屩蹻也出行著之蹻蹻輕便因以為名也屐榰也為兩足榰以踐泥也鞾跨也兩足各以一跨騎也𩌈𩍜鞾之缺前壅者胡中所名也𩌈𩍜猶速獨足直前之言也鞋解也著時縮其上如履然解其上則舒解也帛屐以帛作之如屩者不曰帛屩者屩不可踐泥也屐可以踐泥也此亦可以步泥而浣之故謂之屐也晚下如舄其下晚晚而危婦人短者著之可以拜也靸韋履深頭者之名也靸襲也以其深襲覆足也仰角屐上施履之名也行不得蹶當仰履角舉足乃行也釋宮室第十七宮穹也屋見於垣上穹隆然也室實也人物實滿其中也室中西南隅曰奧不見戶明所在秘奧也西北隅曰屋漏禮每有親死者輒撤屋之西北隅薪以爨竈煮沐供諸喪用時若值雨則漏遂以名之也必取是隅者禮既祭改設饌于西北隅今撤毀之示不復用也東南隅曰窔窔幽也亦取幽冥也東北隅曰宧宧養也東北陽氣始出布養物也中央曰中霤古者𥨍穴後室之霤當今之棟下直室之中古者霤下之處也宅擇也擇吉處而營之也舍於中舍息也宇羽也如鳥羽翼自覆蔽也屋亦奧也其中溫奧也廟貌也先祖形貌所在也寢寢也所寢息也城盛也盛受國都也郭廓也廓落在城外也城上垣曰睥睨言於其孔中睥睨非常也亦曰陴陴裨也言裨助城之高也亦曰女墻言其卑小比之於城若女子之於丈夫也寺嗣也治事者嗣續於其內也廷停也人所停集之處也獄确也實确人之情偽也又謂之牢言所在堅牢也又謂之圜土言築土表墻其形圜也又謂之囹圄囹領也圄御也領錄囚徒禁御之也亭停也亦人所停集也傳轉也人所止息而去後人復來轉轉相傳無常主也瓦踝也踝确堅貌也亦言腂也在外腂見也梁言彊梁也柱住也檼隱也所以隱桷也或謂之望言高可望也或謂之棟棟中也居屋之中也桷确也其形細而踈确也或謂之椽椽傳也相傳次而布列也或謂之榱在檼旁下列衰衰然垂也梠旅也連旅旅也或謂之槾槾緜也緜連榱頭使齊平也上入曰爵頭形似爵頭也楣眉也近前若面之有眉也棳檽也梁上短柱也棳檽猶侏儒短故以名之也梧在梁上兩頭相觸牾也欒攣也其體上曲攣拳然也櫨在柱端如都盧負屋之重也斗在欒兩頭如斗也亦言斗上負檼也笮迮也編竹相連迫迮也屋脊曰甍甍蒙也在上覆蒙屋也壁辟也辟禦風寒也墻障也所以自障蔽也垣援也人所依阻以為援衛也墉容也所以蔽隱形容也籬離也以柴竹作之䟽離離也青徐曰椐椐居也居於中也柵蹟也以木作之上平蹟然也又謂之撤撤緊也詵詵然緊也殿有殿鄂也陛卑也有高卑也天子殿謂之納陛言所以納人言之階陛也階梯也如梯之有等差也陳堂塗也言賓主相迎陳列之處也屏自障屏也蕭廧在門內蕭肅也臣將入於此自肅敬之處也宁佇也將見君所佇立定氣之處也序次序也夾室在堂兩頭故曰夾也堂謂堂堂高顯貌也房旁也在室兩旁也楹亭也亭亭然孤立旁無所依也齊魯謂楹曰輕輕勝也孤立獨處能勝任上重也簷檐也接檐屋前後也霤流也水從屋上流下也闕在門兩旁中央闕然為道也罘罳在門外罘復也罳思也臣將入請事於此復重思之也觀觀也於上觀望也樓謂牗戶之間有射孔樓樓然也臺持也築土堅高能自勝持也櫓露也露上無屋覆也門捫也在外為人所捫摸也闈衛也在內以自障衛也戶護也所以謹護閉塞也窗聰也於內窺外為聰明也屋以草蓋曰茨茨次也次比草為之也寄止曰廬廬慮也取自覆慮也草圓屋曰蒲蒲敷也總其上而敷下也又謂之庵庵奄也所以自覆奄也大屋曰廡廡幠也幠覆也并冀人謂之庌庌雅也雅正也屋之正大者也井清也泉之清潔者也井一有水一無水曰瀱汋瀱竭也汋有水聲汋汋也竈造也造創食物也爨銓也銓度甘辛調和之處也倉藏也藏穀物也庫舍也物所在之舍也故齊魯謂庫曰舍也廄勼也勼聚也牛馬之所聚也廩矜也寶物可矜惜者投之其中也囷綣也藏物繾綣束縳之也庾裕也言盈裕也露積之言也盈裕不可稱受所以露積之也囤屯也屯聚之也圌以草作之團團然也廁言人雜廁在上非一也或曰溷言溷濁也或曰圊至穢之處宜常修治使潔清也或曰軒前有伏似殿軒也泥邇也邇近也以水沃土使相黏近也塗杜也杜塞孔穴也堊亞也亞次也先泥之次以白灰飾之也塈猶煟煟細澤貌也
