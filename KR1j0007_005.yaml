body:
  text: 釋名第四卷釋言語第十二道導也所以通導萬物也德得也得事宜也文彣也會集衆綵以成錦繡會集衆字以成辭義如文繡然也武舞也征伐動行如物鼓舞也故樂記曰發揚蹈厲太公之志也仁忍也好生惡殺善含忍也義宜也裁制事物使合宜也禮體也得事體也智知也無所不知也信申也言以相申束使不相違也孝好也愛好父母如所悅好也孝經說曰孝畜也畜養也慈字也字愛物也友有也相保有也恭拱也自拱持也亦言供給事人也悌弟也敬警也恆自肅警也慢漫也漫漫心無所限忌也通洞也無所不貫洞也達徹也敏閔也進敘無否滯之言也故汝潁言敏曰閔也篤築也築堅實稱也厚後也有終後也故青徐人言厚曰後也薄迫也單薄相逼迫也懿僾也言奧僾也良量也量力而動不敢越限也言宣也宣彼此之意也語敘也敘己所欲說也說述也序述之也序抒也抴抒其實也抴泄也發泄出之也發撥也撥使開也撥播也播使移散也導陶也陶演己意也演延也言蔓延而廣也頌容也序說其成功之形容也讀録也省録之也銘名也記名其功也勒刻也刻識之也紀記也記識之也識幟也有章幟可按視也視是也察其是非也是嗜也人嗜樂之也非排也人所惡排去也基據也在下物所依據也業捷也事捷乃有功業也事倳也倳立也凡所立之功也故青徐人言立曰倳也功攻也攻治之乃成也取趣也名明也名實事使分明也號呼也以其善惡呼名之也善演也演盡物理也惡扼也扼困物也好巧也如巧者之造物無不皆善人好之也醜臭也如物臭穢也遲頽也不進之言也疾截也有所越截也緩浣也斷也持之不急則動搖浣斷自放縱也急及也操切之使相逮及也巧考也考合異類共成一體也拙屈也使物否屈不為用也燥燋也濕浥也彊疆也弱衄也又言委也能該也無物不兼該也否鄙也鄙劣不能有所堪成也躁燥也物燥乃動而飛揚也靜整也逆遌也遌不從其理則生殿遌不順也順循也循其理也清青也去濁遠穢色如青也濁瀆也汁滓演瀆也貴歸也物所歸仰也汝潁言貴聲如歸往之歸也賤踐也卑下見踐履也榮猶熒也熒熒照明貌也辱衄也言折衄也禍毀也言毀滅也福富也其中多品如富者也進引也引而前也退墜也羸纍也恆纍於人也健建也能有所建為也哀愛也愛乃思念之也樂樂也使人好樂之也委萎也萎蕤就之也曲局也相近局也蹤從也人形從之也跡積也積纍而前也扶傅也傅近之也將救護之也縛薄也使相薄著也束促也相促近也覆孚也如孚甲之在物外也蓋加也加物上也威畏也可畏懼也嚴儼也儼然人憚之也政正也下所取正也教俲也下所法俲也侍時也尊者不言常於時供所當進者也御語也尊者將有所欲先語之也亦言職卑尊者所勒御如御牛馬然也雅雒也為之難人將為之雒雒然憚之也俗欲也俗人所欲也艱根也如物根也難憚也人所忌憚也吉實也有善實也凶空也就空亡也停定也定於所在也起啓也啓一舉體也翱敖也言敖遊也翔佯也言仿佯也出推也推而前也入納也納使還也候護也司護諸事也望惘也視遠惘惘也狡交也與物交錯也夬決也有所破壞決裂之於終始也始息也言滋息也消削也言減削也息塞也言物滋息塞滿也姦奸也言奸正法也宄佹也佹易常正也誰推也有推擇言不能一也往暀也歸暀於彼也故其言之卬頭以指遠也來哀也使來入己哀之故其言之低頭以招之也粗錯也相遠之言也細弭也弭弭兩致之言也疏索也獲索相遠也密蜜也如蜜所塗無不滿也甘含也人所含也苦吐也人所吐也安晏也晏晏然和喜無動懼也危阢也阢阢不固之言也成盛也敗潰也亂渾也治值也物皆值其所也煩繁也物繁則相雜撓也省瘦也臞瘦約少之言也間簡也事功簡省也劇巨也事功巨也貞定也精定不動惑也淫浸也浸淫旁入之言也沈淡也淡然安著之言也浮孚也孚甲在上稱也貪探也探入他分也廉斂也自檢斂也潔確也確然不群貌也污汙也如汙泥也公廣也可廣施也私恤也所恤念也勇踴也遇敵踴躍欲擊之也怯脅也見敵恐脅也斷段也分為異段也絶截也如割截也罵迫也以惡言被迫人也詈歷也以惡言相彌歷也亦言離也以此掛離之也祝屬也以善惡之詞相屬著也詛阻也使人行事阻限於言也盟明也告其事於神明也誓制也以拘制之也佐左也在左右也助乍也乍往相助非長久也飾拭也物穢者拭其上使明由他物而後明猶加文於質上也蕩蕩也排蕩去穢垢也啜惙也心有所念惙然發此聲也嗟佐也言之不足以盡意故發此聲以自佐也噫憶也憶念之故發此聲噫之也嗚舒也氣憤滿故發此聲以舒寫之也念黏也意相親愛心黏著不能忘也憶意也恆在意中也思司也凡有所司捕必靜思忖亦然也克刻也刻物有定處人所克念有常心也慮旅也旅衆也易曰一致百慮慮及衆物以一定之也釋飲食第十三飲奄也以口奄而引咽之也食殖也所以自生殖也啜絶也乍啜而絶於口也餐乾也乾入口也吮循也不絶口稍引滋汋循咽而下也嗽促也用口急促也含合也合口停之也銜亦然也咀藉也以藉齒牙也嚼削也稍削也鳥曰啄如琢物上復下也獸曰囓囓齾也所臨則禿齾也餅并也溲麵使合并也胡餅作之大漫沍也亦言以胡麻著上也蒸餅湯餅蝎餅髓餅金餅索餅之屬皆隨形而名之也糝黏也相黏𪏮也餌而也相黏而也兗豫曰溏浹就形名之也餈漬也蒸燥屑使相潤漬餅之也饙分也衆粒各自分也飱散也投水於中解散也羹汪也汁汪郎也䐧蒿也香氣蒿蒿也糜煮米使糜爛也粥濯於糜粥粥然也漿將也飲之寒溫多少與體相將順也湯熱湯湯也酪澤也乳汁所作使人肥澤也虀濟也與諸味相濟成也葅阻也生釀之遂使阻於寒溫之間不得爛也䤅投也味相投成也醢晦也晦冥也封塗使密冥乃成也醢多汁者曰醢醢瀋也宋魯人皆謂汁為瀋醢有骨者曰臡臡胒也骨肉相搏胒無汁也豉嗜也五味調和須之而成乃可甘嗜也故齊人謂豉聲如嗜也麴朽也鬱之使生衣朽敗也糱缺也漬麥覆之使生牙開缺也鮓葅也以鹽米釀之如葅熟而食之也臘乾昔也脯搏也乾燥相搏著也又曰修修縮也乾燥而縮也膊迫也薄㧻肉迫著物使燥也膾會也細切肉令散分其赤白異切之已乃會合和之也炙炙也炙於火上也脯炙以餳密豉汁淹之脯脯然也釜炙於釜汁中和熟之也䐄炙䐄銜也細切肉和以薑椒鹽豉已乃以肉銜裹其表而炙之也貊炙全體炙之各自以刀割出於胡貊之為也膾細切豬羊馬肉使如膾也生脠以一分膾二分細切合和挻攪之也血䐄以血作之增其酢豉之味使甚苦以消酒也膏饡消膏而加葅其中亦以消酒也生瀹葱薤曰兌言其柔滑兌兌然也韓羊韓兔韓雞本法出韓國所為也猶酒言宜成醪蒼梧清之屬也䐿奧也藏肉於奧內稍出用之也脬赴也夏月赴疾作之久則臭也分乾切豬肉以梧分乾其中而和之也肺𦠆𦠆饡也以米糝之如膏饡也雞纖細劈其臘令纖然後漬以酢也兔纖亦如之餳洋也煮米消爛洋洋然也飴小弱於餳形怡怡也餔哺也如餳而濁可哺也酒酉也釀之米麴酉釋久而味美也亦言踧也能否皆彊相踧待飲之也又入口咽之皆踧其面也緹齊色赤如緹也盎齊盎滃也滃滃然濁色也泛齊浮蟻在上泛泛然也沉齊濁滓沉下汁清在上也醴齊醴體也釀之一宿而成體有酒味而已也醳酒久釀酉澤也事酒有事而釀之酒也苦酒淳毒甚者酢苦也寒粥末稻米投寒水中育育然也干飯飯而暴乾之也糗齲也飯而磨之使齲碎也餱候也候人饑者以食之也煮麥曰麮麮亦齲也煮熟亦齲壞也奈油搗奈實和以塗繒上燥而發之形似油也杏油亦如之桃濫水漬而藏之其味濫濫然酢也奈脯切奈暴乾之如脯也鮑魚鮑腐也埋藏奄使腐臭也蟹胥取蟹藏之使骨肉解之胥胥然也蟹虀去其匡加虀熟搗之令如虀也桃諸藏桃也諸儲也藏以為儲待給冬月用之也瓠蓄皮瓠以為脯蓄積以待冬月時用之也釋綵帛第十四青生也象物生時色也赤赫也太陽之色也黃晃也猶晃晃象日光色也白啓也如冰啓時色也黑晦也如晦冥時色也絳工也染之難得色以得色為工也紫疵也非正色五色之疵瑕以惑人者也紅絳也白色之似絳者也緗桑也如桑葉初生之色也緑瀏也荊泉之水於上視之瀏然緑色此似之也縹猶漂漂淺青色也有碧縹有天縹有骨縹各以其色所象言之也緇滓也泥之黑者曰滓此色然也皂早也日未出時早起視物皆黑此色如之也布布也布列衆縷為經以緯橫成之也又太古衣皮女工之始始於是施布其法使民盡用之也亦言踈也其經緯踈也絹䋗也其絲䋗厚而踈也縑兼也其絲細緻數兼於絹也染縑為五色細且緻不漏水也練爛也煮使委爛也素朴素也已織則供用不復加功飾也又物不加飾皆目謂之素此色然也綈似𧋘蟲之色緑而澤也錦金也作之用功重其價如金故其制字帛與金也綺欹也其文欹邪不順經緯之縱橫也有杯文形似杯也有長命其綵色相間皆橫終幅此之謂也言長命者服之使人命長本造者之意也有棋文方文如棋也綾凌也其文望之如冰凌之理也繡修也文修修然也羅文羅踈也纚篩也粗可以篩物也令辟經絲貫杼中一間并一間疏疏者苓苓然并者歷辟而密也紡粗絲織之曰疏疏寥也寥寥然也縠粟也其形戚戚視之如粟也又謂之沙亦取戚戚如沙也繐惠也齊人謂涼為惠言服之輕細涼惠也紈渙也細澤有光渙渙然也蒸栗染紺使黃色如蒸栗然也紺含也青而含赤色也綿猶湎湎柔而無文也綸倫也作之有倫理也絮胥也胥久故解落也紬抽也抽引絲端出細緒也又謂之絓絓挂也挂於杖端振舉之也繭曰幕也貧者著衣可以幕絡絮也或謂之牽離煮熟爛牽引使離散如綿然也釋首飾第十五冠貫也所以貫韜髮也纓頸也自上而繫於頸也笄係也所以係冠使不墜也祭服曰冕冕猶俯也俯平直貌也亦言文也玄上纁下前後垂珠有文飾也有袞冕袞卷也畫卷龍於衣也有鷩冕鷩雉山雞也鷩憋也性急憋不可生服必自殺故畫其形於衣以象人執耿介之節也毳冕毳芮也畫藻文於衣象水草之毳芮溫暖而潔也黹冕黹紩也紩文綵於衣也此皆隨衣而名之也所垂前後珠轉減耳章甫殷冠名也甫丈夫也服之所以表章丈夫也冔亦殷冠名也冔幠也幠之言覆言以覆首也牟追牟冒也言其形冒髮追追然也收夏后氏冠名也言收斂髮也委貌冠形委曲之貌上小下大也辨如兩手相合抃時也以爵韋為之謂之爵辨以鹿皮為之謂之皮辨以𩎟韋為之謂之韋辨也纚以韜髮者也以纚為之因以為名總束髮也總而束之也幘蹟也下齊眉蹟然也兌上小下大兌兌然也或曰聗聗折其後也或曰幘形似幘也賤者所著曰兌髮作之裁裹髮也或曰牛心形似之也帽冒也巾謹也二十成人士冠庶人巾當自謹修於四教也簪兓也以兓連冠於髮也又枝也因形名之也揥摘也所以摘髮也導所以導櫟鬢髮使入巾幘之裏也或曰櫟鬢以事名之也鏡景也言有光景也梳言其齒疏也數言比比於梳其齒差數也比言細相比也刷帥也帥髮長短皆令上從也亦言瑟也刷髮令上瑟然也鑷攝也攝取髮也綃頭綃鈔也鈔髮使上從也或曰陌頭言其從後橫陌而前也齊人謂之㡋言㡋斂髮使上從也王后首飾曰副副覆也以覆首亦言副二也兼用衆物成其飾也編編髮為之也次次第髮也髲被也髮少者得以被助其髮也鬄剔也剔刑人之髮為之也步搖上有垂珠步則搖也簂恢也恢廓覆髮上也魯人曰頍頍傾也著之傾近前也齊人曰𢂹飾形貌也華勝華象草木華也勝言人形容正等一人著之則勝也蔽髮前為飾也爵叉叉頭及上施爵也瑱鎮也懸當耳旁不欲使人妄聽自鎮重也或曰充耳充塞也塞耳亦所以止聽也故里語曰不瘖不聾不成姑公穿耳施珠曰璫此本出於蠻夷所為也蠻夷婦女輕淫好走故以此琅璫錘之也今中國人俲之耳脂砥也著面柔滑如砥石也粉分也研米使分散也胡粉胡糊也脂和以塗面也黛代也滅眉毛去之以此畫代其處也脣脂以丹作之象脣赤也香澤者人髮恆枯悴以此濡澤之也彊其性凝強以制服亂髮也以丹注面曰勺勺灼也此本天子諸侯群妾當以次進御其有月事者止而不御重以口說故注此於面灼然為識女史見之則不書其名於第録也赬粉赬赤也染粉使赤以著頰上也
