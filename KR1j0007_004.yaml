body:
  text: 釋名第三卷釋姿容第九姿資也資取也形貌之稟取為資本也容用也合事宜之用也妍研也研精於事宜則無蚩繆也蚩癡也兩腳進曰行行抗也抗足而前也徐行曰步步捕也如有所伺捕務安詳也疾行曰趨趨赴也赴所至也疾趨曰走走奏也促有所奏至也奔變也有急變奔赴之也仆踣也頓踣而前也超卓也舉腳有所卓越也跳條也如草木枝條務上行也立林也如林木森然各駐其所也騎支也兩腳枝別也乘陞也登亦如之也載戴也戴在其上也檐任也任力所勝也負背也置項背也駐株也如株木不動也坐挫也骨節挫屈也伏覆也偃安也僵正直畺然也側逼也據居也企啟也啟開也自延竦之時諸樞機皆開張也竦從也體枝皆從引也視是也察是非也聽靜也靜然後所聞審也觀翰也望之延頸翰翰也望茫也遠視茫茫也跪危也兩𧀬隱地體危𨺙也跽忌也見所敬忌不敢自安也拜於丈夫為跌跌然屈折下就地也於婦人為扶自抽扶而上下也攀翻也連翻上及之言也掣制也制頓之使順己也牽弦也使弦急也引演也使演廣也掬局也使相局近也撮捽也暫捽取之也樝叉也五指俱往叉取也捉促也使相促及也執攝也使畏攝己也拈黏也兩指翕之黏著不放也抶鐵也其處皮薰黑色如鐵也蹋榻也榻著地也批禆也兩相禆助共擊之也搏博也四指廣博亦以擊之也挾夾也在旁也捧逢也兩手相逢以執之也懷回也本有去意回來就己也亦言歸也來歸己也抱保也相親保也戴載也載之於頭也提地也臂垂所持近地也挈結也結束也束持之也持跱也跱之於手中也操抄也手出其下之言也攬歛也歛置手中也擁翁也翁撫之也撫敷也敷手以拍之也拍搏也手搏其上也摩娑猶末殺也手上下之言也蹙遒也遒迫之也踐殘也使殘壞也踖藉也以足藉也履以足履之因以名之也蹈道也以足踐之如道路也跐弭也足踐之使弭服也躡懾也登其上使懾服也匍匐小兒時也匍猶捕也藉索可執取之言也匍伏也伏地行也人雖長大及其求事盡力之勤猶亦稱之詩曰凡民有喪匍匐救之是也偃蹇偃偃息而臥不執事也蹇跛蹇也病不能作事今託病似此而不宜執事役也望佯佯陽也言陽氣在上舉頭高似若望之然也沐禿沐者髮下垂禿者無髮皆無上貌之稱也卦賣卦掛也自掛於市而自賣邊自可無慚色言此似之也倚簁倚伎也簁作清簁也言人多技巧尚輕細如簁也窶數猶局縮皆小意也齧掣掣卷掣也齧噬齧也語說卷掣與人相持齧也脈摘猶譎摘也如醫別人脈知疾之意見事者之稱也貸騃貸者言以物貸予騃者言必棄之不復得也不相量事者之稱也此皆見於形貌者也臥化也精氣變化不與覺時同也寐謐也靜謐無聲也寢權假臥之名也寢侵也侵損事功也眠泯也無知泯泯也覺告也寤忤也能與物相接忤也欠嶔也開張其口脣嶔嶔然也嚏踕也聲作踕而出也笑鈔也頰皮上鈔者也釋長幼第十人始生曰嬰兒胸前曰嬰抱之嬰前乳養之也或曰嫛婗嫛是也言是人也婗其啼聲也故因以名之也男任也典任事也女如也婦人外成如人也故三從之義少如父教嫁如夫命老如子言青徐州曰娪娪忤也始生時人意不喜忤忤然也兒始能行曰孺孺濡也言濡弱也七年曰悼悼逃也知有廉恥隱逃其情也亦言是時而死可傷悼也毀齒曰齓齓洗也毀洗故齒更生新也長萇也言體萇也幼少也言生日少也十五曰童故禮有陽童牛羊之無角者曰童山無草木曰童言未巾冠似之也女子之未笄者亦稱之也二十曰弱言柔弱也三十曰壯言丁壯也四十曰強言堅強也五十曰艾艾乂也乂治也治事能斷割芟刈無所疑也六十曰耆耆指也不從力役指事使人也七十曰耄頭髮白耄耄然也八十曰耋耋鐵也皮膚變黑色如鐵也九十曰鮐背背有鮐文也或曰黃耇鬢髮變黃也耇垢也皮色驪悴恒如有垢者也或曰胡耇咽皮如雞胡也或曰凍梨皮有班黑如凍梨色也或曰齯齒大齒落盡更生細者如小兒齒也百年曰期頤頤養也老昏不復知服味善惡孝子期於盡養道而已也老朽也老而不死曰仙仙遷也遷入山也故其制字人旁作山也釋親屬第十一親襯也言相隱襯也屬續也恩相連續也父甫也始生己也母冒也含生己也祖祚也祚物先也又謂之王父王暀也家中所歸暀也王母亦如之曾祖從下推上祖位轉增益也高祖高皋也最在上皋韜諸下也兄荒也荒大也故青徐人謂兄為荒也弟弟也相次弟而生也子孳也相生蕃孳也孫遜也遜遁在後生也曾孫義如曾祖也玄孫玄懸也上懸於高祖最在下也玄孫之子曰來孫此在無服之外其意踈遠呼之乃來也來孫之子曰昆孫昆貫也恩情轉遠以禮貫連之耳昆孫之子曰仍孫以禮仍有之耳恩意實遠也仍孫之子曰雲孫言去已遠如浮雲也皆為早娶晚死壽考者言也父之兄曰世父言為嫡統繼世也又曰伯父伯把也把持家政也父之弟曰仲父仲中也位在中也仲父之弟曰叔父叔少也叔父之弟曰季父季癸也甲乙之次癸最在下季亦然也父之世叔父母曰從祖父母言從己親祖別而下也亦言隨從己祖以為名也父之姊妹曰姑姑故也言於己為久故之人也姊積也猶日始出積時多而明也妹昧也猶日始入歷時少尚昧也姑謂兄弟之女為姪姪迭也共行事夫更迭進御也夫之父曰舅舅久也久老稱也夫之母曰姑亦言故也母之兄弟曰舅亦如之也妻之父曰外舅母曰外姑言妻從外來謂至己家為歸故反以此義稱之夫妻匹敵之義也妻之昆弟曰外甥其姊妹女也來歸己內為妻故其男為外姓之甥甥者生也他姓子本生於外不得如其女來在己內也姊妹之子曰出出嫁於異姓而生之也出之子曰離孫言遠離己也姪之子曰歸孫婦人謂嫁曰歸姪子列故其所生為孫也妻之姊妹曰姨姨弟也言與己妻相長弟也母之姊妹曰姨亦如之禮謂之從母為娣而來則從母列也故雖不來猶以此名之也姊妹互相謂夫曰私言於其夫兄弟之中此人與己姊妹有恩私也舅謂姊妹之子曰甥甥亦生也出配他男而生故其制字男旁作生也妾謂夫之嫡妻曰女君夫為男君故名其妻曰女君也嫂叟也叟老者稱也叟縮也人及物老皆縮小於舊也叔少也幼者稱也叔亦俶也見嫂俶然卻退也夫之兄曰兄公公君也君尊稱也俗間曰兄章章灼也章灼敬奉之也又曰兄忪是己所敬見之怔忪自肅齊也俗或謂舅曰章又曰忪亦如之也少婦謂長婦曰姒言其先來己所當法似也長婦謂少婦曰娣娣弟也己後來也或曰先後以來先後弟之也青徐人謂長婦曰稙長禾苗先生者曰稙取名於此也荊豫人謂長婦曰熟熟祝也祝始也兩婿相謂曰亞言一人取姊一人取妹相亞次也又並來至女氏門姊夫在前妹夫在後亦相亞也又曰友婿言相親友也婦之父曰婚言婿親迎用昏又恒以昏夜成禮也婿之父曰姻姻因也女往因媒也天子之妃曰后后後也言在後不敢以副言也諸侯之妃曰夫人夫扶也扶助其君也卿之妃曰內子子女子也在閨門之內治家也大夫之妃曰命婦婦服也服家事也夫受命於朝妻受命於家也士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也天子妾有嬪嬪賓也諸妾之中見賓敬也妾接也以賤見接幸也姪娣曰媵媵承也承事嫡也配輩也一人獨處一人往輩耦之也匹辟也往相辟耦也耦遇也二人相對遇也嫡敵也與匹相敵也庶摭也拾摭之也謂拾摭微陋待遇之也無妻曰鰥鰥昆也昆明也愁悒不寐目恒鰥鰥然也故其字從魚魚目恒不閉者也無夫曰寡寡踝也踝踝單獨之言也無父曰孤孤顧也顧望無所瞻見也老而無子曰獨獨隻獨也言無所依也
