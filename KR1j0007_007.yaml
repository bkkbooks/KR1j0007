body:
  text: 釋名第六卷釋床帳第十八人所坐臥曰床床裝也所以自裝載也長狹而卑曰榻言其榻然近地也小者曰獨坐主人無二獨所坐也枰平也以板作之其體平正也几庪也所以庪物也筵衍也舒而平之衍衍然也席釋也可卷可釋也簟簟也布之簟簟然平正也薦所以自薦藉也蒲平以蒲作之其體平也氈旃也毛相著旃旃然也褥辱也人所坐䙝辱也裘溲猶屢數毛相離之言也榻登施大床之前小榻之上所以登床也貂席連貂皮以為席也枕檢也所以檢項也帷圍也所以自障圍也幕幕絡也在表之稱也小幕曰帟張在人上帟帟然也幔漫也漫漫相連綴之言也帳張也張施於床上也小帳曰斗形如覆斗也㡘廉也自障蔽為廉恥也憧容施之車蓋童童然以隱蔽形容也戶㡘施於戶外也床前帷曰幨言幨幨而垂也幄屋也以帛衣板施之形如屋也承塵施於上承塵土也搏辟以席搏著壁也扆倚也在後所依倚也屏風言可以屏障風也釋書契第十九筆述也述事而書之也硯研也研墨使和濡也墨痗也似物痗墨也紙砥也謂平滑如砥石也板般也般般平廣也奏鄒也鄒狹小之言也札櫛也編之如櫛齒相比也簡間也編之篇篇有間也簿言可以簿䟽物也笏忽也君有教命及所啟白則書其上備忽忘也槧板之長三尺者也槧漸也言其漸漸然長也牘睦也手執之以進見所以為恭睦也籍籍也所以籍䟽人名戶口也檄激也下官所以激迎其上之書文也檢禁也禁閉諸物使不得開露也璽徙也封物使可轉徙而不可發也印信也所以封物為信驗也亦言因也封物相因付也謁詣也詣告也書其姓名於上以告所至詣者也符付也書所勑命於上付使傳行之也亦言赴也執以赴君命也傳轉也轉移所在執以為信也劵綣也相約束繾綣以為限也莂別也大書中央中破別之也契刻也刻識其數也策書教令於上所以驅策諸下也漢制約勑封侯曰冊冊賾也勑使整賾不犯之也示示也過所過所至關津以示之也啟亦詣也以告語官司所至詣也書庶也紀庶物也亦言著也著之簡紙永不滅也畫挂也以五色挂物上也書書稱刺以筆刺紙簡之上也又曰寫倒寫此文也書姓字於奏上曰畫刺作再拜起居字皆達其體使盡邊徐引筆書之如畫者也下官刺曰長刺長書中央一行而下之也又曰爵里刺書其官爵及郡縣鄉里也書牘稱題題諦也審諦其名號也亦言第也因其第次也書文書檢曰署署予也題所予者官號也上勑下曰告告覺也使覺悟知己意也下言上曰表思之於內表施於外也又曰上示之於上也又曰言言其意也約約束之也勑飭也使自警飭不敢廢慢也謂猶喟喟得勑不自安喟喟然也釋典藝第二十三墳墳分也論三才之分天地人之治其體有三也五典典鎮也制法所以鎮定上下其等有五也八索索素也著素王之法若孔子者聖而不王制此法者有八也九丘丘區也區別九州土氣教化所宜施者也此皆三王以前上古羲皇時書也今皆亡惟堯典存也經俓也如俓路無所不通可常用也緯圍也反覆圍繞以成經也圖度也盡其品度也讖纖也其義纖微也易易也言變易也禮體也得其事體也儀宜也得事宜也傳傳也以傳示後人也記紀也紀識之也詩之也志之所以也興物而作謂之興敷布其義謂之賦事類相似謂之比言王政事謂之雅稱頌成功謂之頌隨作者之志而別名之也尚書尚上也以堯為上始而書其時事也春秋春秋冬夏終而成歲春秋書人事卒歲而究備春秋溫涼中象政和也故舉以為名也國語記諸國君臣相與言語謀議之得失也又曰外傳春秋以魯為內以諸國為外外國所傳之事也爾雅爾昵也昵近也雅義也義正也五方之言不同皆以近正為主也論語紀孔子與諸弟子所語之言也法逼也莫不欲從其志逼正使有所限也律累也累人心使不得放肆也令領也理領之使不得相犯也科課也課其不如法者罪責之也詔書詔照也人暗不見事宜則有所犯以此照示之使昭然知所由也論倫也有倫理也稱人之美曰讚讚纂也纂集其美而敘之也敘抒也抒洩其實宣見之也銘名也述其功美使可稱名也誄累也累列其事而稱之也謚曳也物在後為曳言名之於人亦然也譜布也布列見其事也亦曰緒也主緒人世類相繼如統緒也碑被也此本王葬時所設也施其轆轤以繩被其上以引棺也臣子追述君父之功美以書其上後人因焉無故建於道陌之頭顯見之處名其文就謂之碑也詞嗣也令撰善言相續嗣也
