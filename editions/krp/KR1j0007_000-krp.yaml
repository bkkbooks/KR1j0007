  text: 釋名序
  hash: sha256:719ed3d7516886c8ff39c476ad9ad8055dc153d032d5b9cb1e3a89f582cec0be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0007_SBCK_000-1a}
body:
  text: 劉熈字成國撰熈以為自古造化制器立象有物以來迄于近代或典禮所制或出自民庶名號雅俗各方名殊聖人於時就而弗改以成其器著於既徃哲夫巧士以為之名故興於其用而不易其舊所以崇易簡省事功也夫名之於實各有義類百姓日稱而不知其所以之意故撰天地隂陽四時邦國都鄙車服喪紀下及民庶應用之器論叙指歸謂之釋名凡二十七篇至於事類未能究備凡所不載亦欲智者以類求之慱物君子其於答難解惑王父幼孫朝夕侍問以塞可謂之士聊可省諸右釋名八卷館閤書目云漢徵士北海劉熈字成國撰推揆事源釋名號致意精㣲崇文總目云熈即物名以釋義凡二十七目臨安府陳道人書籍鋪刋行刻釋名序釋名者小學文字之書也古者文字之書有三焉一體制謂點畫有縱横曲直之殊若說文字原之類是也二訓話謂稱謂有古今雜俗之異若爾雅釋名之類是也三音韻謂呼吸有淸濁高下之不同若沈約四聲譜及西域反切之文是也三者雖各自名家要之皆小學之書也夫自六經岀而爾雅作爾雅作而釋名著是故漢藝文志以爾雅附孝經而經籍志以附論語盖崇之也漢劉熈所著釋名翼雅者也宜與雅並傳爾雅故有鏤本而釋名久無傳者余按全晋偶得是書於李僉憲川甫川甫得諸蔡中丞石岡石岡得諸濟南周君秀因託吕太史仲木校正付太原黃守刋布焉然則翼雅之書詎止於是乎郭墣有圖沈璇有注孫炎有音江瓘有賛邢昺有正義張揖有廣雅曹憲有慱雅孔鮒有小爾雅劉伯荘有續爾雅楊惟有方言劉霽有釋俗語盧辨有穪謂沈約有俗說張顯有古今訓韋昭有辨釋名凡讀爾雅者皆當參覽其可以小學之書而忽之哉嘉靖甲申冬十二月旣望谷泉儲良材邦掄父撰重刋釋名後序漢徵士北海劉熈著釋名二十七篇盖爾雅之緒也昔者周公申彜倫之道乃制作儀周二禮雅南豳頌四時皆發揮於隂陽象器山河草木以及蟲魚鳥獸之物義雖裁諸巳文多愽諸古恐來世之不觧也其徒作爾雅以訓焉魯哀公欲學小辯以觀政孔子曰觀爾雅以辯言釋名者亦辯言之意乎今夫學者將以爲道也欲爲道而不知義則於道不樂進欲知義而不辯言則於義不可精欲辯言而不正名則於言不能審是故洒掃應對道德性命其致一也夫音以九土而異聲以十世而殊山人以爲葝蒿藿茖者國人以爲䪥蒜韮葱者也古人以爲基烝介弔者今人以爲始君大至者也故名猶朙也釋猶譯也觧也譯而朙之以從義而入道也是書南宋時刻於臨安尋燬不傳今侍御谷泉儲公邦掄得之於嵩山僉憲李公李公得之於中丞石岡蔡公乃命柟校正付絳州守程君鴻刋布焉其意遐乎但爾雅先詁言訓親而後動植近取諸身斯遠取諸物也釋名以天地山水爲先則瀕乎玩物矣故魏張揖采蒼雅作廣雅辭類雖衍猶爲存爾雅之舊乎嘉靖三年冬十月乙卯高陵吕柟序釋名今無刋夲兹所校者又專夲無副正過亦八十餘字皆以意揆諸義者故義若可告即爲定改求而不得仍存其舊序中可謂二字釋國篇譚首之譚一字釋姿容篇邉自二字釋言篇説日二字操功之功一字曽疑爲切字矅嗇之矅一字釋疾篇􆆸一二字凡十一字皆闕未改俟有他夲及知釋名者柟又識釋名目録卷第一釋天釋地釋山釋水釋丘釋道卷第二釋州國釋形體卷第三釋姿容釋長糿釋親屬卷第四釋言語釋飲食釋綵帛釋首飾卷第五釋衣服釋宫室卷第六釋牀帳釋書契釋典藝卷第七釋用器釋樂器釋兵釋車釋船卷第八釋疾病釋䘮制
