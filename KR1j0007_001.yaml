body:
  text: 釋名序熙以為自古造化制器立象有物以來迄于近代或典禮所制或出自民庶名號雅俗各方多殊聖人於時就而弗改以成其器著於既往哲夫巧士以為之名故興於其用而不易其舊所以崇易簡省事功也夫名之於實各有義類百姓日稱而不知其所以之意故撰天地陰陽四時邦國都鄙車服喪紀下及民庶應用之器論敘指歸謂之釋名凡二十七篇至於事類未能究備凡所不載亦欲智者以類求之博物君子其於答難解惑王父幼孫朝夕侍問以塞可謂之士聊可省諸
  hash: sha256:38f9a7ad66deded64e1fb3572994288f65bf78a991f8c60f6576ac3c28befc07
