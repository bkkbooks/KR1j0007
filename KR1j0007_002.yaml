body:
  text: 釋名第一卷釋天第一天豫司兗冀以舌腹言之天顯也在上高顯也青徐以舌頭言之天坦也坦然高而遠也春曰蒼天陽氣始發色蒼蒼也夏曰昊天其氣布散皓皓也秋曰旻天旻閔也物就枯落可閔傷也冬曰上天其氣上騰與地絶也故月令曰天氣上騰地氣下降易謂之乾乾健也健行不息也又謂之玄玄懸也如懸物在上也日實也光明盛實也月缺也滿則缺也光晃也晃晃然也亦言廣也所照廣遠也景境也明所照處有境限也晷規也如規畫也曜耀也光明照耀也星散也列位布散也宿宿也星各止宿其處也氣愾也愾然有聲而無形也風兗豫司冀橫口合脣言之風泛也其氣博泛而動物也青徐言風踧口開脣推氣言之風放也氣放散也陰陰也氣在內奧蔭也陽揚也氣在外發揚也寒捍也捍格也暑煮也熱如煮物也熱爇也如火所燒爇也雨羽也如鳥羽動則散也春蠢也萬物蠢然而生也夏假也寬假萬物使生長也秋緧也緧迫品物使時成也冬終也物終成也四時四方各一時時期也物之生死各應節期而止也歲越也越故限也年進也進而前也唐虞曰載載生物也殷曰祀祀已也新氣升故氣已也五行者五氣也於其方各施行也金禁也其氣剛嚴能禁制也木冒也華葉自覆冒也水準也準平物也火化也消化物也亦言毀也物入中皆毀壞也土吐也能吐生萬物也子孳也陽氣始萌孳生於下也於易為坎坎險也丑紐也寒氣自屈紐也於易為艮艮限也時未可聽物生限止之也寅演也演生物也卯冒也載冒土而出也於易為震二月之時雷始震也辰伸也物皆伸舒而出也巳已也陽氣畢布已也於易為巽巽散也物皆生布散也午仵也陰氣從下上與陽相仵逆也於易為離離麗也物皆附麗陽氣以茂也未昧也日中則昃向幽昧也申身也物皆成其身體各申束之使備成也酉秀也秀者物皆成也於易為兌兌悅也物得備足皆喜悅也戌恤也物當牧斂矜恤之也亦言脫也落也亥核也收藏百物核取其好惡真僞也亦言物成皆堅核也甲孚甲也萬物解孚甲而生也乙軋也自抽軋而出也丙炳也物生炳然皆著見也丁壯也物體皆丁壯也戊茂也物皆茂盛也己紀也皆有定形可紀識也庚猶更也庚堅強貌也辛新也物初新者皆收成也壬妊也陰陽交物懷妊也至子而萌也癸揆也揆度而生乃出之也霜喪也其氣慘毒物皆喪也露慮也覆慮物也雪綏也水下遇寒氣而凝綏綏然也霰星也水雪相摶如星而散也霡霂小雨也言裁霡歷霑漬如人沐頭惟及其上枝而根不濡也雲猶云云衆盛意也又言運也運行也雷硠也如轉物有所硠雷之聲也電殄也乍見則殄滅也震戰也所擊輒破若攻戰也又曰辟歷辟析也所歷皆破析也雹跑也其所中物皆摧折如人所蹴跑也虹攻也純陽攻陰氣也又曰蝃蝀其見每於日在西而見於東啜飲東方之水氣也見於西方曰升朝日始升而出見也又曰美人陰陽不和婚姻錯亂淫風流行男美於女女美於男恆相奔隨之時則此氣盛故以其盛時名之也霓齧也其體斷絶見於非時此災氣也傷害於物如有所食齧也暈捲也氣在外捲結之也日月俱然陰而風曰曀曀翳也言掩翳日光使不明也風而雨土曰霾霾晦也言如物塵晦之色也珥氣在日兩旁之名也珥耳也言似人耳之在面旁也日月虧曰食稍稍侵虧如蟲食草木葉也晦灰也火死為灰月光盡似之也朔蘇也月死復蘇生也弦月半之名也其形一旁曲一旁直若張弓施弦也望月滿之名也月大十六日小十五日日在東月在西遙相望也昏損也陽精損滅也晨伸也旦而日光復伸見也祲侵也赤黑之氣相侵也氛粉也潤氣著草木因寒凍凝色白若粉之形也霧冒也氣蒙亂覆冒物也蒙日光不明蒙蒙然也彗星光梢似彗也孛星星旁氣孛孛然也筆星星氣有一枝末鋭似筆也流星星轉行如流水也枉矢齊魯謂光景為枉矢言其光行若射矢之所至也亦言其氣枉暴有所災害也厲疾氣也中人如磨厲傷物也疫役也言有鬼行役也札截也氣傷人如有斷截也災烖也火所燒滅之餘曰烖言其於物如是也害割也如割削物也異者異於常也眚省也如病者省瘦也慝態也有姦態也妖夭也夭害物也蘖蘖也遇之如物見髡蘖也釋地第二地底也其體底下載萬物也亦言諦也五土所生莫不信諦也易謂之坤坤順也上順乾也土吐也吐生萬物也已耕者曰田田填也五稼填滿其中也壤䑋也肥䑋意也廣平曰原原元也如元氣廣大也高平曰陸陸漉也水流漉而去也下平曰衍言漫衍也下濕曰隰隰蟄也蟄溼意也下而有水曰澤言潤澤也地不生物曰鹵鹵爐也如爐火處也徐州貢土五色有青黃赤白黑也土青曰黎似藜草色也土黃而細密曰埴埴膱也黏胒如脂之膱也土赤曰鼠肝似鼠肝色也土白曰漂漂輕飛散也土黑曰盧盧然解散也釋山第三山産也産生物也土山曰阜阜厚也言高厚也大阜曰陵陵隆也體高隆也山頂曰冢冢腫也言腫起也山旁曰陂言陂陀也山眷曰岡岡亢也在上之言也山旁隴間曰涌涌猶桶桶狹而長也山大而高曰嵩嵩竦也亦高稱也山小而高曰岑岑嶄也嶄嶄然也山鋭而長曰嶠形似橋也小山別大山曰甗甗甑也甑一孔者甗形孤出處似之也山多小石曰磝磝堯也每石堯堯獨處而出見也山多大石曰礐礐學也大石之形學學然也山有草木曰岵岵怙也人所怙取以為事用也山無草木曰屺屺圮也無所出生也山上有水曰埒埒脫也脫而下流也石載土曰岨岨臚然也土載石曰崔嵬因形名之也山東曰朝陽山西曰夕陽隨日所照而名之也山下根之受霤處曰甽甽吮也吮得山之肥潤也山中藂木曰林林森也森森然也山足曰麓麓陸也言水流順陸燥也山體曰石石格也堅捍格也小石曰礫礫料也小石相枝柱其間料料然出內氣也釋水第四天下大水四謂之四瀆江河淮濟是也瀆獨也各獨出其所而入海也江公也諸水流入其中所公共也淮圍也圍繞楊州北界東至海也河下也隨地下處而通流也濟濟也源出河北濟河而南也川穿也穿地而流也山夾水曰澗澗間也言在兩山之間也水正出曰濫泉濫銜也如人口有所銜口闓則見也懸出曰沃泉水從上下有所灌沃也側出曰氿泉氿軌也流狹而長如車軌也所出同所歸異曰肥泉本同出時所浸潤少所歸各枝散而多似肥者也水從河出曰雍沛言在河岸限內時見雍出則沛然也水上出曰涌泉瀆泉並是也水泆出所為澤曰掌水停處如手掌中也今兗州人謂澤曰掌也水決復入為汜汜已也如出有所為畢已而還入也風吹水波成文曰瀾瀾連也波體轉流相及連也水小波曰淪淪倫也小文相次有倫理也水直波曰涇涇徑也言如道徑也水草交曰湄湄眉也臨水如眉臨目也水經川歸之處也海晦也主承穢濁其水黑如晦也水注谷曰溝田間之水亦曰溝溝搆也縱橫相交搆也注溝曰澮澮會也小溝之所聚會也水中可居者曰洲洲聚也人及鳥物所聚息之處也小洲曰渚渚遮也體高能遮水使從旁回也小渚曰沚沚止也小可以止息其上也小沚曰泜泜遲也能遏水使流遲也人所為之曰潏潏術也堰使水鬱術也魚梁水碓之謂也海中可居者曰島島到也人所奔到也亦言鳥也物所赴如鳥之下也釋丘第五丘一成曰頓丘一頓而成無上下大小之殺也再成曰陶丘於高山上一重作之如陶竈然也三成曰崑崙丘如崑崙之高而積重也前高曰髦丘如馬舉頭垂髦也中央下曰宛丘有丘宛宛如偃器也丘上有一泉水亦是也偏高曰阿丘阿荷也如人擔荷物一邊偏高也畝丘丘體滿一畝之地也圜丘方丘就其方圜名之也鋭上曰融丘融明也明陽也凡上鋭皆高而近陽者也如乘曰乘丘四馬曰乘一基在後似車四列在前似駕馬之形也如渚者曰渚丘形似水中之高地隆高而廣也水潦所止曰泥丘其止污水留不去成泥也澤中有丘曰都丘言蟲鳥往所都聚也當途曰梧丘梧忤也與人相當忤也道出其右曰畫丘人尚右凡有指畫皆用右也道出其前曰載丘在前故載也道出其後曰昌丘水出其前曰址丘址基趾也言所出然水出其後曰阻丘背水以為險也水出其右曰沚丘沚止也西方義氣有所制止也水出其左曰營丘丘高曰陽丘體高近陽也宗丘邑中所宗也釋道第六道一達曰道路道蹈也路露也人所踐蹈而露見也二達曰岐旁物兩為岐在邊曰旁此道並通出似之也三達曰劇旁古者列樹以表道道有夾溝以通水潦恆見修治此道旁轉多用功稍劇也四達曰衢齊魯謂四齒杷為欋欋杷地則有四處此道似之也五達曰康康昌也昌盛也車步併列並用之言充盛也六達曰莊莊裝也裝其上使高也七達曰劇驂驂馬有四耳今此道有七比於劇也八達曰崇期崇充也道多所通人充滿其上如共期也九達曰逵齊魯謂道多為逵師此形然也城下道曰䧫䧫翱也都邑之內翱翔祖駕之處也步所用道曰蹊蹊係也射疾則用之故還係於正道也徑經也人所經由也鹿兔之道曰亢行不由正亢陌山谷草野而過也涂度也人所由得通度也
