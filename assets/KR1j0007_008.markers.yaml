  - {type: variant, offset: 998, length: 0, content: '', SBCK: 脚疼力少行遁在後以遜遁者也消弱也如見割削䈥力弱也懈解也骨節觧緩也厥逆氣從下厥起上行入心脇也瘧酷虐也凡疾或寒或熱耳而此疾先寒後熱兩疾似酷虐者也疥齘也癢搔之齒䫴齘也癬徙也浸淫移徙䖏日廣也故青徐謂癬爲徙也胗展也癢搔之捷展起也腫鍾也寒熱氣所鍾聚也癰壅也氣壅否結裏而潰也痳懍也小便難懍懍然也創戕也戕毁體使傷也痍侈也侈開皮膚為創也瘢漫也生漫故皮也痕根也急相根引也瘤流也血流聚所生瘤腫也贅屬也横生一肉屬著體也肬丘也出皮上聚髙如地之有丘也釋喪制第二十七人始氣絶曰死死澌也就消澌也士曰不禄不復食禄也大夫曰卒言卒竟也諸侯曰薨薨壊之聲也天子曰崩崩壊之形也崩硼聲也殪翳也就隠翳也徂落徂祚也福祉殞落也徂亦徃也言徃去落也罪人曰殺殺竄也埋竄之使不復見也罪及餘人曰誅誅株也如株木根枝葉盡落也死於水者曰溺溺弱也不能自勝之言也死於火者曰燒燒燋也戰死曰兵言死為兵所傷也下殺上曰弑弑伺也伺間而後得施也懸繩曰縊縊阨也阨}
