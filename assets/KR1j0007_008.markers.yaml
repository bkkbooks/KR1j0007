  - {type: variant, offset: 2617, length: 606, content: 用虎皮有文采鞇因也因與下轝相連著也𩊙伏也在前人所伏也軾式也所伏以式敬者也靯𩍿車中重薦也輕靯𩍿小貂也轂埆也體堅埆也轅援也車之大援也桄橫在前如臥床之有桄也桄橫也橫在下也薦板在上如薦席也齊人謂車桄以前曰縮言局縮也兗冀曰育御者坐中執御育育然也較在箱上為辜較也立人象人立也或曰陽門在前曰陽兩旁似門也槅扼也所以扼牛頸也馬曰烏啄下向又馬頸似烏開口向下啄物時也隆強言體隆而強也或曰車弓似弓曲也其上竹曰郎䟽相遠晶晶然也𨏴複也重複非一之言也輞罔也罔羅周輪之外也關西曰輮言曲輮也或曰䡑䡑緜也緜連其外也輪綸也言彌綸也周匝之言也𨍉言輻總入轂中也輿舉也軸抽也入轂中可抽出也釭空也其中空也鐧間也間釭軸之間使不相摩也轄害也車之禁害也輠裹也裹軹頭也軹指也如指而見於轂頭也笭橫在車前織竹作之孔笭也蓋在上覆蓋人也軬藩也蔽水雨也轑蓋叉也如屋構橑也杠公也眾叉所公共也䡟棿猶祕齧也在車軸上正輪之祕齧前卻也屐似人屐也又曰伏兔在軸上似之也又曰輹輹伏也伏於軸上也鉤心從輿心下鉤軸也縛在車下與輿相連縛也棠𨅨也在車兩旁𨅨幰使不得進卻也幰憲也所以禦熱也紲制也牽制之也紛放也防其放弛以拘之也轡咈也牽引咈戾以制馬也勒絡也絡其頭而引之也御在口中之言也鏕苞也所以在旁苞歛其口也鞅嬰也喉下稱嬰亦言纓絡之也其下飾曰樊纓其形樊樊而上屬纓也韅經也橫經其腹下也靽半也拘使半行不得自縱也羇檢也所以檢持制之也韁疆也繫之使不得出疆限也鞧遒也在後遒道使不得卻縮也負在背上之言也𩉥懸也所以懸縛軛也, SBCK: ''}
