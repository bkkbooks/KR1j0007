  - {type: variant, offset: 2334, length: 231, content: 車也皆庶人所乘也軘車戎者所乘也容車婦人所載小車也其蓋施帷所以隱蔽其形容也衣車前戶所以載衣服之車也獵車所乘以畋獵也小車駕馬輕小之車也駕馬宜輕故使之局小也高車其蓋高立載之車也安車蓋卑坐乘今吏所乘小車也驘車羔車各以所駕名之也檻車上施欄檻以格猛獸亦囚禁罪人之車也軺車軺遙也遙遠也四向遠望之車也輜車載輜重臥息其中之車也輜廁也所載衣物雜廁其中也軿車軿屏也四面屏蔽婦人所乘牛車也輜軿之形同有邸曰輜無邸曰軿輈句也轅上句也衡橫也橫馬頸上也游環環在服馬背上驂馬之外轡貫之游移前卻無常, SBCK: ''}
