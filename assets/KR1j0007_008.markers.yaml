  - {type: variant, offset: 1000, length: 0, content: '', SBCK: 飾也緦麻緦絲也績麻緦如絲也鍚縗鍚治也治其麻使滑易也疑儗也儗於吉也繐細如繐也䟽䟽如繐也環絰未無餘散麻圓如環也弁絰如爵弁而素如絰也重死者之資重也含餘米以為粥投之甕而懸之比葬末作主權以重主其神也葬藏也壙曠也藏於空曠處也輿棺之車曰轜轜耳也懸於左右前後銅魚揺絞之屬耳耳然也其葢曰柳柳聚也衆飾}
