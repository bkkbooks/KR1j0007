  - {type: variant, offset: 1001, length: 4, content: 指向迅疾, SBCK: 聚亦其形僂也亦曰鼈甲以鼈圧亦然也其旁曰牆似屋牆也翣齊人謂扇為翣此似之也象翣扇為清涼也翣有黼有畫各以其飾名之也兩旁引之曰披披擺也各於一旁引擺之備傾倚也從前引之曰紼紼發也發車使前也懸下壙曰繂繂將也徐徐將下之也棺束曰緘緘函也古者棺不釘也旁際曰小要其要約小}
