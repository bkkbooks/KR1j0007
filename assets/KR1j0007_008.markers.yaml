  - {type: variant, offset: 999, length: 0, content: '', SBCK: 頸也屈頸閉氣曰雉經如雉之為也獄死曰考竟考得其情竟其命於獄也市死曰棄市市衆所聚言與衆人共棄之也斫頭曰斬斬腰曰腰斬斬暫也暫加兵即斷也車裂曰轘轘散也肢體分散也煑之於鑊曰烹若烹禽獸之肉也槌而死曰掠掠狼也用威大􅁀於豺狼也老死曰夀終夀久也終盡也生已久遠氣終盡也少壯而死曰夭如取物中夭折也未二十而死曰殤殤傷也可衰傷也父死曰考考成也亦言槁也槁於義為成凡五材膠漆陶冶皮革乾槁乃成也母死曰妣妣比也比之於父亦然也漢以來謂死為物故言其諸物皆就朽故也既定死曰尸尸舒也骨節觧舒不復皆自勝歛也衣尸曰襲襲匝也以衣周匝覆衣之也以囊韜其形曰冐覆其形使人勿􅁖也已衣所以束之曰絞衿絞定也交結之也衿禁也禁繫之也含以珠貝含其口中也握以物著尸手中使握之也衣尸棺曰歛歛藏不復見也棺闗也闗閉也槨廓也廓落在表之言也尸已在棺曰柩柩究也送終隨身之制皆究備也於西壁下塗之曰殯殯賓也賓客遇之言稍逺也塗曰攢攢木於上而塗之也三日不生生者成服曰縗縗搉也言傷摧也絰實也傷摧之實也絞帶絞麻緦爲帶也三年之縗曰斬不緝其末直翦斬而已期曰齋齋齊也九月曰大功其布如麤大之功不善治練之也小功精細之功小}
