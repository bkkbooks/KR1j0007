  - {type: variant, offset: 1277, length: 578, content: 刀也或曰容刀有刀形而無刃備儀容而已剪刀剪進也所剪稍進前也書刀給書簡札有所刊削之刀也封刀鉸刀皆隨時名之也戟格也旁有枝格也戈句孑戟也戈過也所刺擣則決過所鉤引則制之弗得過也車戟曰常長丈六尺車上所持也八尺曰尋倍尋曰常故稱常也手戟手所持摘之戟也矛冒也刃下冒矜也下頭曰鐏鐏入地也松櫝長三尺其矜宜輕以松作之也櫝速獨也前剌之言也矛長丈八尺曰矟馬上所持言其矟矟便殺也又曰激矛激截也可以激截敵陣之矛也仇矛頭有三叉言可以討仇敵之矛也夷矛夷常也其矜長丈六尺不言常而曰夷者言其可夷滅敵亦車上所持也矛長九尺者也霍也所中霍然即破裂也殳殊也長丈二尺而無刃有所撞挃於車上使殊離也盾遯也跪其後避刃似隱遯也大而平者曰吳魁本出於吳為魁帥者所持也隆者曰須盾本出於蜀須所持也或曰羗盾言出於羗也約脅而鄒者曰陷虜言可以陷破虜敵也今謂之曰露見是也狹而長者曰步盾步兵所持與刀相配者也狹而短者曰孑盾車上所持者也孑小稱也以縫編板謂之木絡以犀皮作之曰犀盾以木作之曰木盾皆因所用為名也鼓排彭旁也在旁排敵禦攻也鎧猶塏也塏堅重之言也或謂之甲似物孚甲以自禦也劍檢也所以防檢非常也又斂也其在身拱時歛在臂內也其旁鼻曰鐔鐔尋也帶所貫尋也其末曰鋒鋒末之言也鋋延也延達也去此至彼之言也鉤鑲兩頭曰鉤中央曰鑲或推鑲或鉤引用之之宜也九旗之名日月為常畫日月於其端天子所建言常明也交龍為旂旂倚也畫作兩龍相依倚也諸侯所建也通帛為旃旃戰也戰戰恭己, SBCK: 哭朝夕}
