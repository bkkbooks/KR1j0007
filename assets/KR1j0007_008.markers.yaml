  - {type: variant, offset: 1999, length: 271, content: 其形橤橤然也或曰綏夏后氏之旌也其形衰衰也白斾殷旌也以帛繼旐末也翿陶也其貌陶陶下垂也幢童也其貌童童然也旛幡也其貌幡幡然也校號也將帥號令之所在也節為號令賞罰之節也鐸度也號令之限度也金鼓金禁也為進退之禁也戚慼也斧以斬斷見者皆慼懼也銊豁也所向莫敢當前豁然破散也釋車第二十四車古者曰車聲如居言行所以居人也今曰車車舍也行者所處若居舍也天子所乘曰玉輅以玉飾車也輅亦車也謂之輅者言行於道路也象輅金輅革輅木輅各隨所以為飾名之也鉤車以行為陣鉤股曲直有正夏所制也胡奴車東胡以罪沒入為官奴者引之殷所制也元戎車元戎在軍前啟突敵陣周所制也輦車人所輦也柏車柏伯也伯大也丁夫, SBCK: 絰}
