  - {type: variant, offset: 394, length: 474, content: 二鍾空也內空受氣多故聲大也磬罄也其聲罄罄然堅緻也鼓郭也張皮以冒之其中空也鞉導也所以導樂作也鼙裨也裨助鼓節也聲在前曰朔朔始也在後曰應應大鼓也所以懸鐘鼓者橫曰簨簨峻也在上高峻也從曰虡虡舉也在旁舉簨也簨上之板曰業刻為牙捷業如鋸齒也瑟施弦張之瑟瑟然也箏施弦高急箏箏然也筑以竹鼓之筑柲之也箜篌此師延所作靡靡之樂也後出於桑間濮上之地蓋空國之侯所存也師涓為晉平公鼓焉鄭衛分其地而有之遂號鄭衛之音謂之淫樂也枇杷本出於胡中馬上所鼓也推手前曰枇引手卻曰杷象其鼓時因以為名也塤喧也聲濁喧喧然也篪啼也聲從孔出如嬰兒啼聲也簫肅也其聲肅肅而清也笙生也竹之貫匏象物貫地而生也以瓠為之故曰匏也竽亦是也竽汙也其中汙空以受簧也簧橫也於管頭橫施於中也以竹鐵作於口橫鼓之亦是也搏拊以韋盛糠形如鼓以手附拍之也柷始見柷柷然也故訓為始以作樂也敔狀如伏虎敔衙也衙止也所以止樂也舂牘舂撞也牘築也以撞築地為節也籥躍也氣躍出也篴滌也其聲滌滌然也鐃聲鐃鐃也人聲曰歌歌柯也所歌之言是其質也以聲吟詠有上下如草木之有柯葉也故兗冀言歌聲如柯也竹曰吹吹推也以氣推發其聲也吟嚴也其聲本出於憂愁故其聲嚴肅使人聽之悽嘆也, SBCK: 七}
