  - {type: variant, offset: 3224, length: 1, content: 船, SBCK: 名卷}
  - {type: variant, offset: 3224, length: 1, content: 船, krp: 名卷}
  - {type: variant, offset: 3226, length: 369, content: 二十五船循也循水而行也又曰舟言周流也其前立柱曰椳椳巍也巍巍高貌也其尾曰柂柂拖也在後見拖曳也且弼正船使順流不使他戾也在旁曰櫓櫓膂也用膂力然後舟行也引舟者曰筰筰作也作起也起舟使動行也在旁撥水曰櫂櫂濯也濯於水中也且言使舟擢進也又謂之札形似札也又謂之楫楫捷也撥水使舟捷疾也所用斥旁岸曰交一人前一人還相交錯也隨風張幔曰帆帆泛也使舟疾汎汎然也舟中床以薦物者曰笭言但有簀如笭床也南方人謂之笭突言濕漏之水𥥛然從下過也其上板曰覆言所覆慮也其上屋曰廬象廬舍也其上重室曰飛廬在上故曰飛也又在上曰爵室於中候望之如鳥雀之警示也軍行在前曰先登登之向敵陣也狹而長曰艨衝以衝突敵船也輕疾者曰赤馬其體正赤疾如馬也上下重床曰艦四方施板以禦矢石其內如牢檻也五百斛以上環有小屋曰斥候以視敵進退也三百斛曰𦩍𦩍貂也貂短也江南所名短而廣安不傾危者也二百斛以下曰艇其形徑挺一人二人所行也, SBCK: 八終}
