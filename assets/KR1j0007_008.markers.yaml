  - {type: variant, offset: 21, length: 370, content: 器始用斧代木已乃制之也鎌廉也體廉薄也其所刈稍稍取之又似廉者也斨戕也所伐皆戕毀也仇矛讎也所伐則平如討仇讎也錐利也椎推也耒亦推也鑿有所穿鑿也鐫鐏也有所鐏入也耜齒也似齒之斷物也犁利也利則發土絕草根也檀垣也摩之使垣然平也鋤助也去穢助苗長也齊人謂其柄曰橿橿然正直也頭曰鶴似鶴頭也枷加也加杖於柄頭以撾穗而出其穀也或曰羅枷三杖而用之也或曰丫丫杖轉於頭故以名之也鍤插也插地起土也或曰銷銷削也能有所穿削也或曰鏵鏵刳也刳地為坎也其板曰葉象木葉也杷播也所以播除物也亦言撥也撥使聚也耨似鋤嫗耨禾也鑮亦鋤類也鑮迫也迫地去草也𨪋溝也既割去壟上草又辟其土以壅苗根使壟下為溝受水潦也釱殺也言殺草也銍穫黍鐵也銍銍斷黍穗聲也釿謹也板廣不可得制削又有節則用此釿之所以詳謹令平滅斧跡也鐁斯彌也釿有高下之跡以此斯彌其上而平之也鋸倨也其體直所截應倨句之平也钃誅也主以誅除物根株也釋樂器, SBCK: ''}
