  - {type: variant, offset: 890, length: 271, content: 易曰立人之道曰仁與義體第也骨肉毛血表裏大小相次第也軀區也是眾名之大揔若區域也形有形象之異也身伸也可屈伸也毛貌也冒也在表所以別形貌且以自覆冒也皮被也被覆體也膚布也布在表也肌懻也膚幕堅懻也骨滑也骨堅而滑也胑枝也似木之枝格也肉柔也筋靳也肉中之力氣之元也靳固於身形也膜幕也幕絡一體也血濊也出於肉流而濊濊也膿醲也汁醲厚也汁涕也涕涕而出也津進也汁進出也汋澤也有潤澤也汗𣵡也出在於表𣵡𣵡然也髓遺也遺瀢也髮拔也拔擢而出也囟峻也所生高峻也髦冒也覆冒頭頸也眉媚也有嫵媚也頭獨也於體高而獨也首始也面漫也額鄂也有垠鄂也故幽州人則謂之鄂也角者生於額角也頞鞍也偃折如鞍也, SBCK: 其字從魚魚}
