  - {type: variant, offset: 57, length: 3, content: 必取荊, SBCK: 故其制字人旁作山也釋親屬第十一親襯也言相隠襯也屬續也恩相連續也父甫也始生已也母冐也含生已也祖祚也祚物先也又謂之王父王􅙬也家中所歸􅙬也王母亦如之曽祖從下推上祖位轉増益也高祖高臯也最在上臯韜諸下也兄荒也荒大也故青徐人謂兄}
  - {type: variant, offset: 57, length: 3, content: 必取荊, krp: 故其制字人旁作山也釋親屬第十一親襯也言相隠襯也屬續也恩相連續也父甫也始生已也母冐也含生已也祖祚也祚物先也又謂之王父王暀也家中所歸暀也王母亦如之曽祖從下推上祖位轉増益也高祖高臯也最在上臯韜諸下也兄荒也荒大也故青徐人謂兄}
