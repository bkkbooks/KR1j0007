  - {type: variant, offset: 1221, length: 599, content: 相裹冒也鼻嘒也出氣嘒嘒也口空也頰夾也兩旁稱也亦取挾歛食物也舌泄也舒泄所當言也齒始也少長之別始乎此也以齒食多者長也食少者幼也牙樝牙也隨形言之也頤養也動於下止於上上下咀物以養人也或曰輔車其骨強所以輔持口也或曰牙車牙所載也或曰頷車頷含也口含物之車也或曰頰車亦所以載物也或曰鼸車鼸鼠之食積於頰人食似之故取名也凡繫於車皆取在下載上物也耳耏也耳有一體屬著兩邊耏耏然也脣緣也口之緣也吻免也入之則碎出則免也又取抆也漱唾所出恒加抆拭因以為名也或曰口卷也可以卷制食物使不落也鼻下曰立人取立於鼻下狹而長似人立也口上曰髭髭姿也為姿容之美也口下曰承漿承水漿也頤下曰鬚鬚秀也物成乃秀人成而鬚生也亦取須體幹長而後生也在頰耳旁曰髯隨口動搖髯髯然也其上連髮曰鬢鬢濱也濱崖也為面額之崖岸也鬢曲頭曰距距矩也言其曲似矩也項确也堅确受枕之處也頸俓也俓挺而長也咽咽物也或謂之䑍在頤下纓理之中也青徐謂之脰物投其中受而下之也又謂之嗌氣所流通阨要之處也胡互也在咽下垂能歛互物也胸猶啌也啌氣所衝也臆猶抑也抑氣所塞也膺壅也氣所壅塞也腹複也富也腸胃之屬以自裹盛復於外複之其中多品似富者也心纖也所識纖微無物不貫也肝幹也五行屬木故其體狀有枝幹也凡物以木為幹也肺㪍也言其氣㪍鬱也脾禆也在胃下禆助胃氣主化穀也腎引也腎屬水主引水氣灌注諸脈也胃圍也圍受食物也腸暢也通暢胃氣去滓穢也臍劑也腸端之所限劑也自臍以下曰水腹水汋所聚也又曰少腹少小也比於臍以上為小也胞𩎘也𩎘空虛, SBCK: 踝踝單獨}
