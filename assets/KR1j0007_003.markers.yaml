  - {type: variant, offset: 49, length: 4, content: 荊州取名, krp: 言濡弱也七年曰悼悼逃也知有㢘耻隱逃其情也亦言是時而死可傷悼也毁齒曰齓齓洗也毁洗故齒更生新也長反丁文萇也言體萇也㓜少也言生日少也十五曰童故禮有陽童牛羊之無角者曰童山無草木曰童言未巾冠似之也女子之未笄者亦稱之也二十曰弱言柔弱也三十曰壯言丁壯也四十曰强言堅强也五十曰艾艾治也治事能㫁割芟刈無所疑也六十曰耆耆指也不從力役指事使人也七十曰耄頭髪白耄耄然也八十曰耋耋鐵也皮膚變黒色如鐵也九十曰鮐背背有鮐文也或曰黃耉鬢髪變黃也耉垢也皮色驪悴恒如有垢者也或曰胡耉咽皮如雞胡也或曰凍梨皮有班黒如凍梨色也或曰齯齯大齒落盡更生細者如小兒齒也百年曰期頥頥養也老昏不復知服味善惡孝子期}
