  - {type: variant, offset: 30, length: 0, content: '', SBCK: 行曰步步捕也如有所伺捕務安詳也疾行曰趨趨赴也赴所至也疾趨曰走走奏也促有所奏至也奔變也有急變奔赴之也仆踣也頓踣而前也超卓也舉脚有所卓越也跳條也如草木枝條務上行也立林也如林木森然各駐其所也騎支也兩脚枝别也乘陞也登亦如之也載載也在其上也檐任也任力所勝也負背也置項背也駐株也如株木不動也坐挫也骨節挫屈也伏覆也偃安也僵正直畺然也側逼也據居也企啓開也目延踈之時諸機樞皆開張也竦從也體皮皆從引也視是也察是非也聽静也静然後所聞審也觀翰也望之延頸翰翰也望茫也逺視茫茫也跪危也兩藤隠地體危倪也跽忌也見所敬忌不敢自安也拜於丈夫為跌跌然屈折下就地也於婦人為扶自抽扶而上下也攀翻也連翻上及言也掣制也制頓之使順已也牽􅁌也使􅁌急也引演也徒演廣也掬局也使相局近也撮捽也暫捽取之也樝义也五指俱徃也捉促也使相促及也執攝也使畏攝已也拈黏也兩指翕之黏著不放也抶鐵也其處皮薫黒色如鐵也蹋榻也榻著地也批禆也兩相禆助共擊之也搏慱也四指廣慱亦似擊之也挾夾也在旁也捧逢也兩手相逢以執之也懐回也本有去意囘來就已也亦言歸也來歸已也抱保也相親保也載載也載之於頭也提地也臂垂所持近地也挈結也結束也束持之也持跱也跱之於手中也操抄也手出其下之言也攬歛也歛置手中也擁翁也翁撫之也撫敷也敷手以拍之也拍搏也手搏其上也摩娑猶末殺也手上下言之也蹙遵也遵迫之也踐殘也使殘壊也踖藉也以足藉也履以足履之因以名之也蹈道也以足踐之如道路也􅝌弭也足踐之使弭服也躡懾也登其上使懾服也匍匐小兒時也匍猶捕也藉索可執取之言也匐伏也伏地行也人雖長大及其求事盡力之勤猶亦稱之詩曰凡民有喪匍匐救之是也偃蹇也偃息而卧不執事也蹇跛蹇也病不能作事今託病似此而不冝執事役也望佯佯陽也言陽氣在上舉頭高似若望之然也沐秃也沐者髪下垂秃者無髪皆無上貌之稱也卦賣卦掛也自掛於市而自賣邉自可無慙色言此似之也倚簁倚伎也簁作清簁也言人多技巧尚輕細如簁也窶數猶局縮皆小意也齧掣掣卷掣也齧噬齧也語説卷掣與人相持齧也衇摘猶譎摘也如醫别人衇知疾之意見事者之稱也貸騃者貸言以物貸予騃者言必弃之不復得也不相量事者之稱也此皆見於形貌者也卧化也精氣變化不與覺時同也􅄰謐也静謐無聲也􅆍權假卧之名也􅆍侵也侵損事功也眠泯也無知泯泯也覺告也窹忤也能與物相接忤也欠嶔也開張其口聲脣嶔嶔也􅅉踕也聲作踕而出也笑鈔也頰皮上鈔者也釋長㓜第十人始生曰嬰兒胷前曰嬰抱之嬰前乳飬之也或曰嫛婗嫛是也言是人也婗其啼聲也故因以名之也男任也典任事也女如也婦人外成如人也故三從之義少如父教嫁如夫命老如子言青徐}
