  - {type: variant, offset: 401, length: 2, content: 捉促, SBCK: 教俲也下所法俲也侍時也尊者不言常於時供所當進者也御語也尊者將有所欲先語之也亦言職卑尊者所勤御如御牛馬然也雅雒也為之難人將為之雒雒然憚之也俗欲也俗人所欲也艱根也如物根也難憚也人所忌憚也吉實也有善實也凶納弭也弭弭兩致之言也䟽索也獲索相逺也宻蜜也如蜜所塗無不滿也甘含也人所含也苦吐也人所吐也安晏也晏晏然和喜無動懼也危阢也阢阢不固之言也成盛也敗潰也亂渾也治值也物皆值其所也煩繁也物繁則相雜撓也省嗇也曜嗇約少之言也間簡也事功簡省也劇巨也事功巨也貞定也精定不動惑也淫浸也浸淫旁人之言也沈澹也澹然安著之言也浮孚也孚甲在上稱也貪探也探入他分也㢘歛也自檢歛也潔確也確然不羣貌也汚洿也如洿泥也公廣也可廣施也私恤也所恤念也勇踴也遇敵踴躍欲擊之也怯脅也見敵恐脅也㫁段也分為異段也絶截也如割截也罵迫也以惡言被迫人也詈歴也以􅁖言相彌歴也亦言離也以此掛離之也祝屬也以善􅁖之詞相屬著也詛阻}
