  - {type: variant, offset: 651, length: 2, content: 足踐, SBCK: 脯搏也乾燥相搏著也又曰脩脩縮也乾燥而縮也膊迫也薄㧻肉迫著物使燥也膾會也細切肉令散分其赤白異切之已乃㑹合和之也炙炙也炙如火上也脯炙以餳宻豉汁淹之脯脯然也釜炙於釜汁中和熟之也䐄衘也衘炙細宻肉和以薑椒塩豉已乃以肉衘裹其表而炙之也貊炙全體炙之各自以刀割出於胡貊之爲也膾細切猪羊馬肉使如膾也生脠以一分膾二分細切合和挻攪之也血䐄以血作之増其酢豉之味使苦苦以消酒也消膏而加葅其中亦以消酒也生瀹葱薤曰兊言其柔滑兌兑然也韓羊韓兔韓鷄本法出韓國所為也猶酒言冝成醪蒼梧清之屬也䐿奥也藏肉於奥内稍出用之也脬赴也夏月赴疾作之久則臭也分乾切猪肉以梧分乾其中而和之也肺􅍧􅍧饡也以米糝之如膏饡也鷄纖細擗其腊令纎然後漬以酢也兔纎亦如之餳洋也煑米消爛洋洋然也飴小弱於餳形怡怡也哺餔也如餳而濁可餔也酒酉也釀之米麴酉澤久而味美也亦言踧也能否皆彊相踧待飲之也又入口咽之皆踧其面也緹齊色赤如緹也盎齊盎滃滃然濁色也汎齊浮蟻在上汎汎然也沉齊濁滓沉下汁清在上也醴齊醴禮也釀之一宿而成禮有酒味而已也醳酒久釀酉澤也事酒有事而釀之酒也苦酒淳毒甚者酢苦也寒粥末稻米投寒水中育育然也干飯飯而􅁀乾之也糗齲也飯而磨}
