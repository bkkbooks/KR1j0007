  - {type: variant, offset: 1751, length: 0, content: '', SBCK: 文也􅀇上纁下前後垂珠有文飾也有衮冕袞卷也􅀞卷龍於衣也有鷩冕鷩雉之憋惡者山鷄是也鷩憋也性急憋不可生服必自殺故􅀞其形於衣以象人執耿介之節也毳冕毳芮也􅀞藻文於衣象水草之毳芮温暖而潔也黻冕黻紩也畫黻紩文綵於衣也此皆}
  - {type: variant, offset: 1751, length: 0, content: '', krp: 文也玄上纁下前後垂珠有文飾也有衮冕袞卷也畫卷龍於衣也有鷩冕鷩雉之憋惡者山鷄是也鷩憋也性急憋不可生服必自殺故畫其形於衣以象人執耿介之節也毳冕毳芮也畫藻文於衣象水草之毳芮温暖而潔也黻冕黻紩也畫黻紩文綵於衣也此皆}
  - {type: variant, offset: 1752, length: 3, content: 從己祖, SBCK: 衣而名之也所垂前後珠轉減耳章甫殷冠名也甫丈夫也服之所以表章丈夫也牟追牟冐也言其形冐髪追追然也收夏后氏冠名也言收歛髮也委貌冠形又委貌之貌上小下大也弁如兩手相合抃時也以爵韋為之謂之爵弁以鹿皮為之謂之皮弁以韎􅅊為之也纚以韜髮者也以纚為之因}
