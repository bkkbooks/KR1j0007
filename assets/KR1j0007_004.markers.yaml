  - {type: variant, offset: 1060, length: 355, content: 也婦人外成如人也故三從之義少如父教嫁如夫命老如子言青徐州曰娪娪忤也始生時人意不喜忤忤然也兒始能行曰孺孺濡也言濡弱也七年曰悼悼逃也知有廉恥隱逃其情也亦言是時而死可傷悼也毀齒曰齓齓洗也毀洗故齒更生新也長萇也言體萇也幼少也言生日少也十五曰童故禮有陽童牛羊之無角者曰童山無草木曰童言未巾冠似之也女子之未笄者亦稱之也二十曰弱言柔弱也三十曰壯言丁壯也四十曰強言堅強也五十曰艾艾乂也乂治也治事能斷割芟刈無所疑也六十曰耆耆指也不從力役指事使人也七十曰耄頭髮白耄耄然也八十曰耋耋鐵也皮膚變黑色如鐵也九十曰鮐背背有鮐文也或曰黃耇鬢髮變黃也耇垢也皮色驪悴恒如有垢者也或曰胡耇咽皮如雞胡也或曰凍梨皮有班黑如凍梨色也或曰齯齒大齒落盡更生細者如小兒齒也百年曰期頤頤養也老昏不復知服味善惡孝子期於盡養道而已也老朽也老而不死曰仙仙遷也遷入山也, SBCK: 金}
