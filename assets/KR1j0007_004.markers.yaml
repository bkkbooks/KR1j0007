  - {type: variant, offset: 637, length: 2, content: 蹈道, SBCK: 糝􅭓也相黏􅭓也餌而也相黏而也兖豫曰溏浹就形名之也餈漬也丞燥屑使相潤漬餅之也饙分也衆粒各自分也飱散也投水於中解散也嘆汪也汁汪郎也䐧蒿也香氣蒿蒿也糜煑米使糜爛也粥濯於糜粥粥然也漿將也飲之寒温多少與體相將順也湯熱湯湯也酪澤也乳作汁所使人肥澤也虀濟也與諸味相濟成也􅉁阻也生釀之遂使阻於寒温之間不得爛也䤅投也味相投成也醢海也㝠也封塗使宻㝠乃成也醢多汁者曰醯醯瀋也宋魯人皆謂汁為瀋醢有骨者曰臡反如吮臡胒也骨􅤾相搏胒無汁也豉嗜也五味調和須之而成乃可甘嗜也故齊人謂豉聲如嗜也麴朽也鬱之使生衣朽敗也糵缺也漬夌覆之使生牙開缺也鮓}
