  - {type: variant, offset: 2049, length: 184, content: 中此人與己姊妹有恩私也舅謂姊妹之子曰甥甥亦生也出配他男而生故其制字男旁作生也妾謂夫之嫡妻曰女君夫為男君故名其妻曰女君也嫂叟也叟老者稱也叟縮也人及物老皆縮小於舊也叔少也幼者稱也叔亦俶也見嫂俶然卻退也夫之兄曰兄公公君也君尊稱也俗間曰兄章章灼也章灼敬奉之也又曰兄忪是己所敬見之怔忪自肅齊也俗或謂舅曰章又曰忪亦如之也少婦謂長婦曰姒言其先來己所當法似也長婦謂少婦曰娣娣弟也己後來, SBCK: 裹}
