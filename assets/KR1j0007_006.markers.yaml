  - {type: variant, offset: 832, length: 337, content: 羞鄙於袒而衣此耳褌貫也貫兩腳上繫要中也幅所以自逼束也今謂之行縢言以裏腳可以跳騰輕便也襪末也在腳末也履禮也飾足所以為禮也複其下曰舄舄腊也行禮久立地或泥濕故複其下使乾腊也屨拘也所以拘足也齊人謂韋屨曰屝屝皮也以皮作之不借言賤易有宜各自蓄之不假借人也齊人云搏腊搏腊猶把鮓麤貌也荊州人曰麤絲麻韋草皆同名也麤措也言所以安措足也屩蹻也出行著之蹻蹻輕便因以為名也屐榰也為兩足榰以踐泥也鞾跨也兩足各以一跨騎也𩌈𩍜鞾之缺前壅者胡中所名也𩌈𩍜猶速獨足直前之言也鞋解也著時縮其上如履然解其上則舒解也帛屐以帛作之如屩者不曰帛屩者屩不可踐泥也屐可以踐泥也此亦可以步泥而浣之故謂之屐也晚下如舄其下晚晚而危婦人短者著之可以拜也靸韋履深頭者之名也靸襲也以其深襲覆足也仰角屐上施履之名也行不得蹶當仰履角舉足乃行, SBCK: 相續嗣}
