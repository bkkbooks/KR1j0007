  - {type: variant, offset: 153, length: 2, content: 在後, SBCK: 第因其第次也書文書檢曰署署予也題所予者官號也上勑下曰告告覺也使覺悟知己意也下言上曰表思之於内表施於外也又曰上示之於上也又曰言言其意也約約束之也勑飾也使自警飾不敢廢慢也謂猶謂也猶得勑不自安謂謂然也釋典藝第二十三墳墳分也論三才之分天地人之治其體有三也五典典鎮也制法所以鎮定上下其等有五也八索索素也著素王之法若孔子者聖而不王制此法者有八也九丘丘區也區别九州土氣教化所冝施者也此皆三王以前上古羲皇時書也今皆亡惟堯典存也經俓也如俓路無所不通可}
