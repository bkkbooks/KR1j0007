  - {type: variant, offset: 1174, length: 1312, content: 十七宮穹也屋見於垣上穹隆然也室實也人物實滿其中也室中西南隅曰奧不見戶明所在秘奧也西北隅曰屋漏禮每有親死者輒撤屋之西北隅薪以爨竈煮沐供諸喪用時若值雨則漏遂以名之也必取是隅者禮既祭改設饌于西北隅今撤毀之示不復用也東南隅曰窔窔幽也亦取幽冥也東北隅曰宧宧養也東北陽氣始出布養物也中央曰中霤古者𥨍穴後室之霤當今之棟下直室之中古者霤下之處也宅擇也擇吉處而營之也舍於中舍息也宇羽也如鳥羽翼自覆蔽也屋亦奧也其中溫奧也廟貌也先祖形貌所在也寢寢也所寢息也城盛也盛受國都也郭廓也廓落在城外也城上垣曰睥睨言於其孔中睥睨非常也亦曰陴陴裨也言裨助城之高也亦曰女墻言其卑小比之於城若女子之於丈夫也寺嗣也治事者嗣續於其內也廷停也人所停集之處也獄确也實确人之情偽也又謂之牢言所在堅牢也又謂之圜土言築土表墻其形圜也又謂之囹圄囹領也圄御也領錄囚徒禁御之也亭停也亦人所停集也傳轉也人所止息而去後人復來轉轉相傳無常主也瓦踝也踝确堅貌也亦言腂也在外腂見也梁言彊梁也柱住也檼隱也所以隱桷也或謂之望言高可望也或謂之棟棟中也居屋之中也桷确也其形細而踈确也或謂之椽椽傳也相傳次而布列也或謂之榱在檼旁下列衰衰然垂也梠旅也連旅旅也或謂之槾槾緜也緜連榱頭使齊平也上入曰爵頭形似爵頭也楣眉也近前若面之有眉也棳檽也梁上短柱也棳檽猶侏儒短故以名之也梧在梁上兩頭相觸牾也欒攣也其體上曲攣拳然也櫨在柱端如都盧負屋之重也斗在欒兩頭如斗也亦言斗上負檼也笮迮也編竹相連迫迮也屋脊曰甍甍蒙也在上覆蒙屋也壁辟也辟禦風寒也墻障也所以自障蔽也垣援也人所依阻以為援衛也墉容也所以蔽隱形容也籬離也以柴竹作之䟽離離也青徐曰椐椐居也居於中也柵蹟也以木作之上平蹟然也又謂之撤撤緊也詵詵然緊也殿有殿鄂也陛卑也有高卑也天子殿謂之納陛言所以納人言之階陛也階梯也如梯之有等差也陳堂塗也言賓主相迎陳列之處也屏自障屏也蕭廧在門內蕭肅也臣將入於此自肅敬之處也宁佇也將見君所佇立定氣之處也序次序也夾室在堂兩頭故曰夾也堂謂堂堂高顯貌也房旁也在室兩旁也楹亭也亭亭然孤立旁無所依也齊魯謂楹曰輕輕勝也孤立獨處能勝任上重也簷檐也接檐屋前後也霤流也水從屋上流下也闕在門兩旁中央闕然為道也罘罳在門外罘復也罳思也臣將入請事於此復重思之也觀觀也於上觀望也樓謂牗戶之間有射孔樓樓然也臺持也築土堅高能自勝持也櫓露也露上無屋覆也門捫也在外為人所捫摸也闈衛也在內以自障衛也戶護也所以謹護閉塞也窗聰也於內窺外為聰明也屋以草蓋曰茨茨次也次比草為之也寄止曰廬廬慮也取自覆慮也草圓屋曰蒲蒲敷也總其上而敷下也又謂之庵庵奄也所以自覆奄也大屋曰廡廡幠也幠覆也并冀人謂之庌庌雅也雅正也屋之正大者也井清也泉之清潔者也井一有水一無水曰瀱汋瀱竭也汋有水聲汋汋也竈造也造創食物也爨銓也銓度甘辛調和之處也倉藏也藏穀物也庫舍也物所在之舍也故齊魯謂庫曰舍也廄勼也勼聚也牛馬之所聚也廩矜也寶物可矜惜者投之其中也囷綣也藏物繾綣束縳之也庾裕也言盈裕也露積之言也盈裕不可稱受所以露積之也囤屯也屯聚之也圌以草作之團團然也廁言人雜廁在上非一也或曰溷言溷濁也或曰圊至穢之處宜常修治使潔清也或曰軒前有伏似殿軒也泥邇也邇近也以水沃土使相黏近也塗杜也杜塞孔穴也堊亞也亞次也先泥之次以白灰飾之也塈猶煟煟細澤貌也, SBCK: 六}
