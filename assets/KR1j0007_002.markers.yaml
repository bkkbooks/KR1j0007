  - {type: variant, offset: 6, length: 0, content: '', SBCK: 州國第七釋形體第八釋州國第七青州在東取物生而青也州注也郡國所注仰也徐州徐舒也土氣舒緩也楊州州界多水水波揚也荆州取名於荆山也必取荆為名者荆警也南蠻數為冦逆其民有道後服無道先彊常警備之也豫州地在九州之中京師東都所在常安豫也凉州西方所在寒涼也雍州在四山之内雍翳也并州曰土無也其州或并或設故因以為名也幽州在北幽昧之地也冀州亦取地以為名也其地有險有易帝王所都亂則冀治弱則冀彊荒則冀豐也兖州取兖水以為名也司州司􅀠校尉所主也益州益阨也所在之地險阨也古有營州齊衛之地於}
