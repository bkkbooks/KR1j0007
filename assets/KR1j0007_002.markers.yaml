  - {type: variant, offset: 27, length: 2, content: 青徐, SBCK: 西海海在其西也南海在海南也冝言海南欲同四海名故言南海東海海在其東也濟南濟水在其南也一濟北濟水在其北也義亦如南海也濟隂在濟水之隂也南陽在國之南而地陽也凡若此類郡國之名取號於此則其餘可知也縣邑之名亦如之大曰邦邦封也封有功於是也國城曰都者國君所居人所都會也周制九夫為井其制似井字也四井為邑邑猶悒也邑人聚會之稱也四邑為丘丘聚也四丘為甸甸乗也出兵車一乘也鄙否也小邑不能逺通也縣懸也懸係於郡也郡羣也人所羣聚也五家為伍}
