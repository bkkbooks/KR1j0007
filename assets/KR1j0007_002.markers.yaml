  - {type: variant, offset: 1917, length: 548, content: 甽甽吮也吮得山之肥潤也山中藂木曰林林森也森森然也山足曰麓麓陸也言水流順陸燥也山體曰石石格也堅捍格也小石曰礫礫料也小石相枝柱其間料料然出內氣也釋水第四天下大水四謂之四瀆江河淮濟是也瀆獨也各獨出其所而入海也江公也諸水流入其中所公共也淮圍也圍繞楊州北界東至海也河下也隨地下處而通流也濟濟也源出河北濟河而南也川穿也穿地而流也山夾水曰澗澗間也言在兩山之間也水正出曰濫泉濫衘也如人口有所衘口闓則見也懸出曰沃泉水從上下有所灌沃也側出曰氿泉氿軌也流狹而長如車軌也所出同所歸異曰肥泉本同出時所浸潤少所歸各枝散而多似肥者也水從河出曰雍沛言在河岸限內時見雍出則沛然也水上出曰涌泉瀆泉並是也水泆出所為澤曰掌水停處如手掌中也今兗州人謂澤曰掌也水決復入為汜汜已也如出有所為畢已而還入也風吹水波成文曰瀾瀾連也波體轉流相及連也水小波曰淪淪倫也小文相次有倫理也水直波曰涇涇俓也言如道俓也水草交曰湄湄眉也臨水如眉臨目也水經川歸之處也海晦也主承穢濁其水黑如晦也水注谷曰溝田間之水亦曰溝溝搆也縱橫相交搆也注溝曰澮澮會也小溝之所聚會也水中可居者曰洲洲聚也人及鳥物所聚息之處也小洲曰渚渚遮也體高能遮水使從旁廻也小渚曰沚沚止也小可以止息其上也小沚曰泜泜遲也能遏水使流遲也人所為之曰潏潏術也堰使水鬱術也魚梁水碓之謂也海中可居者曰島島到也人所奔到, SBCK: 蹁蹁扁}
