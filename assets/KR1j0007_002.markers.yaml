  - {type: variant, offset: 15, length: 2, content: 舌腹, SBCK: 為國都也宋送也地接淮泗而東南傾以為殷後若云滓穢所在送使隨流東入海也鄭町也其地多平町町然也楚辛也其地蠻多而人性急數有戰争相争相害辛楚之禍也周地在岐山之南其山四周也秦津也其地沃衍有津潤也晉進也其土在北有事於中國則進而南也又取晉水以為名其水迅進也趙朝也本小邑朝事於大國也魯魯鈍也國多山水民性樸魯也衛衛也既滅殷立武庚為殷後三監以守衛之也齊齊也地在渤海之南勃齊之中也呉虞也太伯讓位而不就歸封之於此虞其志也越夷蠻之國也度越禮義無所拘也此十二國上應列宿各以其地及於事冝制此名也至秦改諸侯置郡縣隨其所在山川土形而立其名漢就而因之也河南在河之南也河内河水從岐山而南從雷首而東從譚首而北郡在其内也河東在河水東也河西在河水西也上黨黨所也在山上其所最高故曰上也潁川因潁水為名也汝南在汝水南也汝隂在汝水隂也東郡南郡皆以京師方面}
