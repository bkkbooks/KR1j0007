  - {type: variant, offset: 6, length: 5, content: 自古造化制, SBCK: 事用也山無草木曰屺屺圯也無所出生也山上有水曰垺垺脱也脱而下流也石載土曰岨岨臚然也土載石曰崔嵬因形名之也山東曰朝陽山西曰夕陽隨日所照而名之也山下根之受霤處曰甽甽吮也吮得山之肥潤也山中藂木曰林林森也森森然也山足曰麓麓陸也言水流順陸燥也山體曰石石格也堅捍格也小石曰礫礫料也小石相枝柱其間料料然出内氣也釋水第四天下大水四謂之四瀆江河淮濟是也瀆獨也各獨出其所而入海也江公也小水流入其中公共也淮圍也圍繞揚州北界東至海也河下也隨地下處而通流也濟濟也源出河北濟河而南也川穿也穿地而流也山夾水曰澗澗間也言在兩山之間也水正出曰濫泉濫䘖也如人口有所䘖口闓則見也懸出曰沃泉水從上下有所灌沃也側出曰汍泉汍􅁤也流狹而長如車􅁤也所出同所歸異曰淝泉本同出時所浸潤少所歸各枝散而多似淝者也水從河出曰雍沛言在河岸限内時見雍出則沛然也水上出曰涌泉瀆泉並是也水泆出所為澤曰掌水停處如手掌中也今兗州人謂澤曰掌也水決復入為汜汜已也如出有所為畢已而還入也風吹水波成文曰瀾瀾連也波體轉流相及連也水小波曰淪淪倫也小文相次有倫理也水直波曰涇涇徑也言如道徑也水草交曰湄湄眉也臨水如眉臨目也水經川歸之處也海晦也主承穢濁其水黒如晦也水注谷曰溝田間之水亦曰溝溝搆也縱橫相交搆也注溝曰澮澮會也小溝之所聚會也水中可居者曰洲洲聚也人及鳥物所聚息之處也小洲曰渚渚遮也體高能􅃒水使從旁迴也小渚曰沚沚止也小可以止息其上也小沚曰泜泜遲也能遏水使流遲也人所為之曰潏潏術也堰使水鬱術也魚梁水碓之謂也海中可居者曰島島到也人所奔到也亦言鳥也物所赴如鳥之下也釋丘第五丘一成曰頓丘一頓而成無上下大小之殺也再成曰陶丘於高山上一重作之如陶竈然也三成曰崑崙丘如崑崙之髙而積重也前高曰髦丘如馬舉頭垂髦也中央下曰宛丘有丘宛宛如偃}
