  - {type: variant, offset: 2, length: 2, content: 序熙, SBCK: 卷第一劉熈字成國撰釋天第一釋地第二釋山第三釋水第四釋丘第五釋道第六釋天第一天豫司兗冀以舌腹言之天顯也在上高顯也青徐以舌頭言之天垣也垣然高而逺也春曰蒼天陽氣始發色蒼蒼也夏曰昊天其氣布散皓皓也秋曰旻天旻閔也物就枯落可閔傷也冬曰上天其氣上騰與地絶也故月令曰天氣上騰地氣下降易謂之乾乾徤也徤行不息也又謂之􅀇􅀇懸也如懸物在上也日實也光明盛實也月缺也滿則缺也光晃也晃晃然也亦言廣也所照廣逺也景境也明所照䖏有境限也晷規也如規畫也曜耀也光明照耀也星散也列位布散也宿宿也星各止宿其處也氣餼也餼然有聲而無形也風兖豫司冀橫口合脣言之風汜也其氣慱汜而動物也青徐言風踧口開脣推氣言之風放也氣放散也隂隂也氣在内奥䕃也陽揚也氣在外發揚也寒捍也捍格也暑煑也熱如煑物也熱爇也如火所燒爇也雨羽也如鳥羽動則散也春蠢也動而生也夏假也寛假萬物使生長也秋緧也緧迫品物使時成也冬終也物終成也四時四方各一時時期也物之生死各應節期而止也年進也進而前也歳越也越故限也唐虞曰載載生物也殷曰祀祀已也新氣升故氣已也五行者五氣也於其方各施行也金禁也其氣剛嚴能禁制也木冐也華葉自覆冐也水準也準平物也火化也消化物也亦言毁也物入中皆毁壊也土吐也能吐生萬物也子孳也陽氣始萌孳生於下也於易為坎坎險也丒紐也寒氣自屈紐也於易為艮艮限也時未可聴物生限止之也寅演也演生物也卯冐也載冐土而出也於易為震二月之時雷始震也辰伸也物皆伸舒而出也己巳也陽氣畢布已也於易為巽巽散也物皆生布散也午仵也隂氣從下上與陽相仵逆也於易為離離麗也物皆附麗陽氣以茂也未昧也日中則昃向幽昧也申身也物皆成其身體各申束之使備成也酉秀也秀者物皆成也於易為兌兑説也物得備足皆喜説也戌恤也物當收歛矜恤之也亦言脱也落也亥核也收藏百物核取其好惡直偽也亦言物成皆堅核也甲孚也萬物解孚甲而生也乙軋也自抽軋而出也丙炳也物生炳然皆著見也丁壯也物體皆丁壯也戊茂也物皆茂盛也已紀也皆有定形可紀識也庚猶更也庚堅强貌也辛新也物初新者皆收成也壬妊也隂陽交物懐妊也至子而萌也癸揆也揆度而生乃出之也霜喪也其氣慘毒物皆喪也露慮也覆慮物也雪綏也水下遇寒氣而凝綏綏然也霰星也水雪相搏如星而散也霡霂小雨也言裁霡歴霑漬如人沐頭惟及其上枝而根不濡也雲猶云云衆盛意也又言運也運行也雷硍也如轉物有所硍雷之聲也電殄也乍見則殄滅也震戰也所擊輙破若攻戰也又曰辟歴辟折也所歴皆破折也雹砲也其所中物皆摧折如人所盛咆也虹攻也純陽攻隂氣也又曰蝃蝀其見每於日在西而見於東掇飲東方之水氣也見於西方曰升朝日始升而出見也又曰美人隂陽不和婚姻錯亂淫風流行男美於女女美於男恒相奔隨之時則此氣盛故以其盛時名之也霓齧也其體㫁絶見於非時此灾氣也傷害於物如有所食齧也暈捲也氣在外捲結之也日月俱然隂而風曰曀曀翳也言掩翳日光使不明也風而雨土曰霾霾晦也言如物塵晦之色也珥氣在日兩旁之名也珥耳也言似人耳之在面旁也日月虧曰食稍稍侵虧如蟲食草木葉也晦灰也火死為灰月光盡似之也朔蘇也月死復蘇生也􅁌月半之名也其形一旁曲一旁直若張弓施􅁌也望月滿之名也月大十六日小十五日日在東月在西遥相望也昏損也陽精損滅也晨伸也旦而日光復伸見也祲侵也赤黒之氣相侵也氛粉也潤氣著草木因寒凍凝色白若粉之形也霧冐也氣蒙亂覆冐物也蒙日光不明蒙蒙然也彗星光梢似彗也孛反蒲没星星旁氣孛孛然也筆星星氣有一枝末鋭似筆也流星星轉行如流水也枉矢齊魯謂光景為枉矢言其光行若射矢之所至也亦言其氣枉暴有所灾害也厲疾氣也中人如磨厲傷物也疫役也言有鬼行疫也截也氣傷人如有斷截也灾烖也火所燒滅之餘曰烖言其於物如是也害割也如割削物也異者異於常也􅌌痟也如病者痟瘦也慝態也有姦態也妖殀也殀害物也孽孽也遇之如物見髠孽也釋地第二地者底也其體底下載萬物也亦言諦也五土所生莫不信諦也易謂之坤坤順也上順乾也土吐也吐生萬物也已耕者曰田田填也五稼填滿其中也壤瀼也肥濡意也廣平曰原原元也如元氣廣大也高平曰陸陸漉也水流漉而去也下平曰衍言漫衍也下濕曰隰隰蟄也蟄溼意也下而有水曰澤言潤澤也地不生物曰鹵鹵爐也如爐火處也徐州貢土五色有青黄赤白黒也土青曰黎似黎草色也土黃而細宻曰埴埴膩也黏胒如脂之膩也土赤曰䑕肝似䑕肝色也土白曰漂漂輕飛散也土黒曰盧盧然觧散也釋山第三山産也産生物也土山曰阜阜厚也言高厚也大阜曰陵陵隆也體髙隆也山頂曰􅃁􅃁腫也言腫起也山旁曰陂言陂陁也山脊曰岡岡亢也在上之言也山旁隴間曰涌涌猶桶桶狹而長也山大而髙曰嵩嵩竦也亦高稱也山小高曰岑岑嶃也嶃然也上鋭而長曰嶠形似橋也小山别大山曰甗彦音甗甑也甑一孔者甗形孤出處似之也山多小石曰磝磝堯也毎石堯堯獨處而出見也山多大石曰礐礐學也大石之形學學形也山有草木曰岵岵怙也人所怙取}
