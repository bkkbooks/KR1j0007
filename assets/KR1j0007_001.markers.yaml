  - {type: variant, offset: 16, length: 0, content: '', SBCK: 一邊偏高也畝丘丘體滿一畝之地也圜丘方丘就其方圜名之也鋭上曰融丘融明也明陽也凡上鋭皆高而近陽者也如乗曰乘丘四馬曰乗一基在後似車四列在前似駕馬車之形也如陼反之與者曰陼丘形似水中之高地隆髙而廣也水潦所止曰泥丘其止汚水留不去成泥也澤中有丘曰都丘言蟲鳥徃所都聚也當途曰梧丘梧忤也與人相當忤也道出其右曰畫丘人尚右凡有指畫皆用右也道出其前曰載丘在前故載也道出其後曰昌丘水出其前曰阯丘阯基趾也言所出然水出其後曰阻丘比水}
