  - {type: variant, offset: 3819, length: 168, content: 相比也刷帥也帥髮長短皆令上從也亦言瑟也刷髮令上瑟然也鑷攝也攝取髮也綃頭綃鈔也鈔髮使上從也或曰陌頭言其從後橫陌而前也齊人謂之㡋言㡋歛髮使上從也王后首飾曰副副覆也以覆首亦言副貳也兼用眾物成其飾也編編髮為之也次次第髮也髲被也髮少者得以被助其髮也鬄剔也剔刑人之髮為之也步搖上有垂珠步則搖也簂恢也恢廓覆髮上也魯人曰頍頍傾也著之傾近前也齊人曰𢂹飾形, SBCK: 澤}
