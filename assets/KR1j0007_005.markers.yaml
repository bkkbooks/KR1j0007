  - {type: variant, offset: 3065, length: 1, content: 價, SBCK: 下曰舄舄腊也行禮久立地或泥濕故􅃨其末下使乾腊也屨拘也所以拘足也齊人謂韋屨曰屝屝皮也以皮作之不借言賤易有冝各自蓄之不假借人也齊人云搏腊搏腊猶把鮓麤貌也荆州人曰麤麻韋草皆同名也麤措也言所以安措足也屩蹻也出行著之蹻蹻輕便因以為名也屐搘也為兩足搘以踐泥也鞾跨也兩足各以一跨騎也􅤼􅝿鞾之缺前壅者胡中所名也􅤼􅝿猶速獨足直前之言也鞋觧也著時縮其上}
