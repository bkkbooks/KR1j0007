  - {type: variant, offset: 68, length: 356, content: 發揚蹈厲太公之志也仁忍也好生惡殺善含忍也義宜也裁制事物使合宜也禮體也得事體也智知也無所不知也信申也言以相申束使不相違也孝好也愛好父母如所悅好也孝經說曰孝畜也畜養也慈字也字愛物也友有也相保有也恭拱也自拱持也亦言供給事人也悌弟也敬警也恒自肅警也慢漫也漫漫心無所限忌也通洞也無所不貫洞也達徹也敏閔也進敘無否滯之言也故汝潁言敏曰閔也篤築也築堅實稱也厚後也有終後也故青徐人言厚曰後也薄迫也單薄相逼迫也懿僾也言奧僾也良量也量力而動不敢越限也言宣也宣彼此之意也語敘也敘己所欲說也說述也序述之也序抒也抴抒其實也抴泄也發泄出之也發撥也撥使開也撥播也播使移散也導陶也陶演己意也演延也言蔓延而廣也頌容也序說其成功之形容也讀錄也省錄之也銘名也記名其功也勒刻也刻識之也紀記也記識之也識幟也有章幟可按視也視是也察其是非也是嗜也人嗜樂之也非排, SBCK: 衣衣依}
