  - {type: variant, offset: 1854, length: 1, content: 餌, SBCK: 荆州謂襌衣曰布䙱亦是襜襦言其䄡䄡􅀪􅁉也褠禪衣之無胡者也言袖夾直形如溝也中衣言在小衣之外大衣之中也禰襠其一當􅎍其一當背也帕腹橫帕其腹也抱腹上下有帶抱裏其腹上無襠者也心衣抱腹}
