  - {type: variant, offset: 3076, length: 2, content: 綺欹, SBCK: 靸韋履深頭者之名也靸襲也以其深襲覆足也仰角屐上施履之名也行不得蹶當仰履角舉足乃行也釋宫室第十七宫穹也屋見於垣上穹隆然也室實也人物實滿其中也室中西南隅曰奥不見户明所在秘奥也西北隅曰屋漏禮每有親死者輙撤屋之西北隅薪以爨竈煮沐供諸喪用時若值雨則漏遂以名之也必取是隅者禮既祭改設饌于西北隅令撤毁之示不復用也東南隅曰窔窔幽也亦取幽㝠也東北隅曰䆠䆠養也東北陽氣始出布飬物也中央曰中霤古者􅆍穴後室之霤當今之棟下直室之中古者霤下之處也宅擇也擇吉處而營之也舍於中舍息也宇羽也如鳥羽翼自覆蔽也屋亦奥}
