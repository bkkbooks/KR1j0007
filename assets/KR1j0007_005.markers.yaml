  - {type: variant, offset: 3989, length: 252, content: 華勝華象草木華也勝言人形容正等一人著之則勝也蔽髮前為飾也爵釵釵頭及上施爵也瑱鎮也懸當耳旁不欲使人妄聽自鎮重也或曰充耳充塞也塞耳亦所以止聽也故里語曰不瘖不聾不成姑公穿耳施珠曰璫此本出於蠻夷所為也蠻夷婦女輕淫好走故以此琅璫錘之也今中國人俲之耳脂砥也著面柔滑如砥石也粉分也研米使分散也胡粉胡餬也脂和以塗面也黛代也滅眉毛去之以此畫代其處也脣脂以丹作之象脣赤也香澤者人髮恒枯悴以此濡澤之也彊其性凝強以制服亂髮也以丹注面曰勺勺灼也此本天子諸侯群妾當以次進御其有月事者止而不御重以口說故注此於面灼然為識女史見之則不書其, SBCK: 釋}
