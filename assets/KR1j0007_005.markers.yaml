  - {type: variant, offset: 1850, length: 0, content: '', SBCK: 伊洛而南雉青質五色備曰翬鷂翟􅀞鷂雉之文於衣也江淮而南雉素質五采皆備成章曰鷂闕翟翦闕繒為翟雉形以綴衣也鞠衣黄如菊花色也襢衣襢坦也坦然正白無文采也禒衣禒然黒色也韠蔽也所以蔽膝前也婦人蔽膝亦如之齊人謂之巨巾田家婦女出自田野以覆其頭故因以為名也又曰跪䄡跪時䄡䄡然張也佩倍也言其非一物有倍貳也有珠有玉有容刀有帨巾有觽之屬也􅃭䎡也言温䎡也袴跨也兩股各跨别也褶襲也覆上之言也襌衣言無裏也䙱屬也衣裳上下}
