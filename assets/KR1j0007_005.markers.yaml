  - {type: variant, offset: 909, length: 764, content: 所取正也教俲也下所法俲也侍時也尊者不言常於時供所當進者也御語也尊者將有所欲先語之也亦言職卑尊者所勒御如御牛馬然也雅雒也為之難人將為之雒雒然憚之也俗欲也俗人所欲也艱根也如物根也難憚也人所忌憚也吉實也有善實也凶空也就空亡也停定也定於所在也起啟也啟一舉體也翱敖也言敖遊也翔佯也言仿佯也出推也推而前也入納也納使還也候護也司護諸事也望惘也視遠惘惘也狡交也與物交錯也夬決也有所破壞決裂之於終始也始息也言滋息也消削也言減削也息塞也言物滋息塞滿也姦奸也言奸正法也宄佹也佹易常正也誰推也有推擇言不能一也往暀也歸暀於彼也故其言之卬頭以指遠也來哀也使來入己哀之故其言之低頭以招之也麤錯也相遠之言也細弭也弭弭兩致之言也疏索也獲索相遠也密蜜也如蜜所塗無不滿也甘含也人所含也苦吐也人所吐也安晏也晏晏然和喜無動懼也危阢也阢阢不固之言也成盛也敗潰也亂渾也治值也物皆值其所也煩繁也物繁則相雜撓也省瘦也臞瘦約少之言也間簡也事功簡省也劇巨也事功巨也貞定也精定不動惑也淫浸也浸淫旁入之言也沈澹也澹然安著之言也浮孚也孚甲在上稱也貪探也探入他分也廉歛也自檢歛也潔確也確然不群貌也污洿也如洿泥也公廣也可廣施也私恤也所恤念也勇踴也遇敵踴躍欲擊之也怯脅也見敵恐脅也斷段也分為異段也絕截也如割截也罵迫也以惡言被迫人也詈歷也以惡言相彌歷也亦言離也以此掛離之也祝屬也以善惡之詞相屬著也詛阻也使人行事阻限於言也盟明也告其事於神明也誓制也以拘制之也佐左也在左右也助乍也乍往相助非長久也飾拭也物穢者拭其上使明由他物而後明猶加文於質上也蕩盪也排盪去穢垢也啜惙也心有所念惙然發此聲也嗟佐也言之不足以盡意故發此聲以自佐也噫憶也憶念之故發此聲噫之也嗚舒也氣憤滿故發此聲以舒寫之也念黏也意相親愛心黏著不能忘也憶意也恒在意中也思司也凡有所司捕必靜思忖亦然也克刻也刻物有定處人所克念有常心也慮旅也旅眾也易, SBCK: ''}
