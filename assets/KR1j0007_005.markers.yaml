  - {type: variant, offset: 498, length: 409, content: 其善惡呼名之也善演也演盡物理也惡扼也扼困物也好巧也如巧者之造物無不皆善人好之也醜臭也如物臭穢也遲頹也不進之言也疾截也有所越截也緩浣也斷也持之不急則動搖浣斷自放縱也急及也操切之使相逮及也巧考也考合異類共成一體也拙屈也使物否屈不為用也燥燋也濕浥也彊畺也弱衂也又言委也能該也無物不兼該也否鄙也鄙劣不能有所堪成也躁燥也物燥乃動而飛揚也靜整也逆遌也遌不從其理則生殿遌不順也順循也循其理也清青也去濁遠穢色如青也濁瀆也汁滓演瀆也貴歸也物所歸仰也汝潁言貴聲如歸往之歸也賤踐也卑下見踐履也榮猶熒也熒熒照明貌也辱衂也言折衂也禍毀也言毀滅也福富也其中多品如富者也進引也引而前也退墜也羸累也恒累於人也健建也能有所建為也哀愛也愛乃思念之也樂樂也使人好樂之也委萎也萎蕤就之也曲局也相近局也蹤從也人形從之也跡積也積累而前也扶傅也傅近之也將救護之也縛薄也使相薄著也束促也相促近也覆孚也如孚甲之在物外也蓋加也加物上也威畏也可畏懼也嚴儼也儼然人憚之也政正, SBCK: 芘寒暑}
