  - {type: variant, offset: 2615, length: 290, content: 麮麮亦齲也煮熟亦齲壞也柰油搗柰實和以塗繒上燥而發之形似油也杏油亦如之桃濫水漬而藏之其味濫濫然酢也柰脯切柰暴乾之如脯也鮑魚鮑腐也埋藏奄使腐臭也蟹胥取蟹藏之使骨肉解之胥胥然也蟹虀去其匡加虀熟搗之令如虀也桃諸藏桃也諸儲也藏以為儲待給冬月用之也瓠蓄皮瓠以為脯蓄積以待冬月時用之也釋綵帛第十四青生也象物生時色也赤赫也太陽之色也黃晃也猶晃晃象日光色也白啟也如冰啟時色也黑晦也如晦冥時色也絳工也染之難得色以得色為工也紫疵也非正色五色之疵瑕以惑人者也紅絳也白色之似絳者也緗桑也如桑葉初生之色也綠瀏也荊泉之水於上視之瀏然綠色此似之也縹猶漂漂淺青色也有碧縹有天縹有骨縹各以其色所象言之也緇滓也泥之黑者, SBCK: 鄙􅃝或}
