  - {type: variant, offset: 2092, length: 457, content: 使生牙開缺也鮓葅也以鹽米釀之如葅熟而食之也腊乾昔也脯搏也乾燥相搏著也又曰脩脩縮也乾燥而縮也膊迫也薄㧻肉迫著物使燥也膾會也細切肉令散分其赤白異切之已乃會合和之也炙炙也炙於火上也脯炙以餳密豉汁淹之脯脯然也釜炙於釜汁中和熟之也䐄炙䐄銜也細切肉和以薑椒鹽豉已乃以肉銜裹其表而炙之也貊炙全體炙之各自以刀割出於胡貊之為也膾細切豬羊馬肉使如膾也生脠以一分膾二分細切合和挻攪之也血䐄以血作之增其酢豉之味使甚苦以消酒也膏饡消膏而加葅其中亦以消酒也生瀹葱薤曰兌言其柔滑兌兌然也韓羊韓兔韓鷄本法出韓國所為也猶酒言宜成醪蒼梧清之屬也䐿奧也藏肉於奧內稍出用之也脬赴也夏月赴疾作之久則臭也分乾切豬肉以梧分乾其中而和之也肺𦠆𦠆饡也以米糝之如膏饡也鷄纖細擗其腊令纖然後漬以酢也兔纖亦如之餳洋也煮米消爛洋洋然也飴小弱於餳形怡怡也餔哺也如餳而濁可哺也酒酉也釀之米麴酉釋久而味美也亦言踧也能否皆彊相踧待飲之也又入口咽之皆踧其面也緹齊色赤如緹也盎齊盎滃也滃滃然濁色也汎齊浮蟻在上汎汎然也沉齊濁滓沉下汁清在上也醴齊醴體也釀之一宿而成體有酒味而已也醳酒久釀酉, SBCK: 澤受汗}
