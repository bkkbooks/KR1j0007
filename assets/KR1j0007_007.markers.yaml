  - {type: variant, offset: 138, length: 6, content: 裘溲猶屢數毛, SBCK: 簫弣之間曰淵淵宛也言曲宛也弩怒也有勢怒也其柄曰臂似人臂也鉤絃者曰牙似齒牙也牙外曰郭為牙之䂓郭也下曰懸刀其形然也合名之曰機言如機之巧也亦言如門户之樞機開闔有節也天指也言其有所指向迅疾也又謂之箭前進也其本曰足矢形似木木以下為本本以根爲足也又謂之鏑鏑敵也可以禦敵也齊人謂之鏃鏃族也言其所中皆族滅也闗西曰釭釭鉸也言有交刅也其體曰幹言梃幹也其旁曰羽如鳥羽也鳥須羽而飛矢須羽而前也齊人曰衛所以導衛矢也其末曰栝栝會也與􅁌㑹也栝旁曰义形似义也其受之器以皮曰箙謂柔服用之也織竹曰笮}
