  - {type: variant, offset: 165, length: 4, content: 貂席連貂, SBCK: 櫝速櫝也前刺之言也矛長丈八尺曰矟馬上所持言其矟矟便殺也又曰激矛激截也可以激截敵陣之矛也仇矛頭有三义言可以討仇敵之矛也夷矛夷常也其矜長丈六尺不言常而曰夷者言其可夷滅敵亦車上所持也作移徐本矛長九尺者也霍也所中霍然即破裂也殳矛殳殊也長丈二尺而無刅有所撞挃於車上使殊離也盾遯也跪其後避以􅀮遯也太而平者曰呉魁本岀於呉為魁帥者所持也隆者曰須盾本出於蜀須所持也或曰羗盾言出於羗也約䝱而鄒者曰陷虜言可以陷破虜敵也今謂之曰露見是也狹而長者曰步盾步兵所持與刀相配者也狹而短者曰孑盾車上所持者也孑小稱也以縫編板謂之木絡以犀}
  - {type: page-break, offset: 165, content: '', id: KR1j0007_SBCK_007-5b}
