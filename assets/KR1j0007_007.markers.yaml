  - {type: variant, offset: 182, length: 0, content: '', SBCK: 又其在身拱時歛在臂内也其旁鼻曰鐔鐔尋也帶所貫尋也其末曰鋒鋒末之言也鋋延也達也去此至彼之言也鉤鑲兩頭曰鉤中央曰鑲或推鑲或鉤引用之之冝也九旗之名日月為常􅀞日月於其端天子所建言常明也交龍為旂旂倚也􅀞作兩龍相依倚也通以赤色為之無文采諸侯所建也通帛為􅏧􅏧戰也戰戰恭已而已也三孤所建象無事也熊虎為旗軍將所建象其猛如虎與衆期其下也鳥隼為􅒅􅒅譽也軍吏所建急疾趨事則有稱譽也雜帛為斾以雜色綴其邉為趐尾也將帥所建象物雜也􅀛蛇為旐旐兆也􅀛知氣兆之吉凶建之於後察度事冝之形兆也金羽為猶滑也順滑之貌也析雨為旌旌精也有精光也緌有虞氏之旌也注旄竿首其形蘂蘂然也綏夏后氏之旌也其形衰衰也白斾殷旌也以帛􅁇旐末也翿陶也其貌陶陶下垂也幢童也其貌童童也旛幡也其貌幡幡也校號也將帥號令之所在也節為號令賞罰之節也鐸度也號令之限度也金皷金禁也為進退之禁也戚慼也斧以斬斷見者皆慼懼也銊豁也所向莫敢當前豁然破散也釋車第二十四車古者曰車聲如居言行所以居人也今曰車車舍也行者所處若車舍也天子所乗曰玉輅以玉飾車也輅亦車也謂之輅者言行於道路也象輅金輅木輅各隨所以為飾名之也鉤車以行為陣鉤股曲直有正夏所制也胡車車胡以罪没入為官奴者引之殷所制也元戎車在軍前啓突敵陣周所制也輦車人所輦也柏車柏伯也大也丁夫服任之小車也羊車羊祥也祥善也善飾之車今犢車是也墨車漆之正黒無文飾大夫所乗也重較其較重卿所乗也役車給役之車也棧車棧靖也麻靖物之車也皆庶人所乗也軘車戎者所乗也容車婦人所載小車也其盖施}
