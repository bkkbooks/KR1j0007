  - {type: variant, offset: 895, length: 415, content: 使自警飭不敢廢慢也謂猶喟喟得勑不自安喟喟然也釋典藝第二十三墳墳分也論三才之分天地人之治其體有三也五典典鎮也制法所以鎮定上下其等有五也八索索素也著素王之法若孔子者聖而不王制此法者有八也九丘丘區也區別九州土氣教化所宜施者也此皆三王以前上古羲皇時書也今皆亡惟堯典存也經俓也如俓路無所不通可常用也緯圍也反覆圍繞以成經也圖度也盡其品度也讖纖也其義纖微也易易也言變易也禮體也得其事體也儀宜也得事宜也傳傳也以傳示後人也記紀也紀識之也詩之也志之所以也興物而作謂之興敷布其義謂之賦事類相似謂之比言王政事謂之雅稱頌成功謂之頌隨作者之志而別名之也尚書尚上也以堯為上始而書其時事也春秋春秋冬夏終而成歲春秋書人事卒歲而究備春秋溫涼中象政和也故舉以為名也國語記諸國君臣相與言語謀議之得失也又曰外傳春秋以魯為內以諸國為外外國所傳之事也爾雅爾昵也昵近也雅義也義正也五方之言不同皆以近正為主也論語紀孔子與諸弟子所語之言也法逼也莫不欲從其志逼正使有所限也律累也累人心, SBCK: 在車兩旁􅎻}
