  - {type: variant, offset: 182, length: 0, content: '', krp: 又其在身拱時歛在臂内也其旁鼻曰鐔鐔尋也帶所貫尋也其末曰鋒鋒末之言也鋋延也達也去此至彼之言也鉤鑲兩頭曰鉤中央曰鑲或推鑲或鉤引用之之冝也九旗之名日月為常畫日月於其端天子所建言常明也交龍為旂旂倚也畫作兩龍相依倚也通以赤色為之無文采諸侯所建也通帛為􅏧􅏧戰也戰戰恭已而已也三孤所建象無事也熊虎為旗軍將所建象其猛如虎與衆期其下也鳥隼為旟旟譽也軍吏所建急疾趨事則有稱譽也雜帛為斾以雜色綴其邉為趐尾也將帥所建象物雜也龜蛇為旐旐兆也龜知氣兆之吉凶建之於後察度事冝之形兆也金羽為猶滑也順滑之貌也析雨為旌旌精也有精光也緌有虞氏之旌也注旄竿首其形蘂蘂然也綏夏后氏之旌也其形衰衰也白斾殷旌也以帛繼旐末也翿陶也其貌陶陶下垂也幢童也其貌童童也旛幡也其貌幡幡也校號也將帥號令之所在也節為號令賞罰之節也鐸度也號令之限度也金皷金禁也為進退之禁也戚慼也斧以斬斷見者皆慼懼也銊豁也所向莫敢當前豁然破散也釋車第二十四車古者曰車聲如居言行所以居人也今曰車車舍也行者所處若車舍也天子所乗曰玉輅以玉飾車也輅亦車也謂之輅者言行於道路也象輅金輅木輅各隨所以為飾名之也鉤車以行為陣鉤股曲直有正夏所制也胡車車胡以罪没入為官奴者引之殷所制也元戎車在軍前啓突敵陣周所制也輦車人所輦也柏車柏伯也大也丁夫服任之小車也羊車羊祥也祥善也善飾之車今犢車是也墨車漆之正黒無文飾大夫所乗也重較其較重卿所乗也役車給役之車也棧車棧靖也麻靖物之車也皆庶人所乗也軘車戎者所乗也容車婦人所載小車也其盖施}
  - {type: punctuation, offset: 183, content: ，, id: KR1j0007_tls_007-bkkpn52}
  - {type: 'tls:seg', offset: 183, content: '', id: KR1j0007_tls_007-17a.3}
  - {type: variant, offset: 183, length: 1, content: 圍, SBCK: 所以隠蔽其形容也衣車前户所以載衣服之車也獵車所乗以畋獵也小車駕馬輕小之車也駕馬冝輕使之局小也高車其盖高立載之車也安車盖卑坐乗今吏之乗小車也驘車羔車各以所駕名之也檻車上施欄檻以格猛獸之車也軺車軺遥也逺也四向逺望之車也輜車載輜重卧息其中之車也輜厠也所載衣物雜厠其中也軿車軿屏也四面屏蔽婦人所乗牛馬也輜駢之形同有邸曰輜無邸曰軿輈句也轅上句也衡横也横馬頸上也游環在服馬背上驂馬之外轡貫之游移前却無常處也脅驅在服馬外脅也隂䕃也横側車前以隂笭也靷所以引車也鋈金塗沃也冶白金以沃灌靷環也續續靷端也文鞇車中所坐者也用虎皮有文采因與下轝相連著也伏也在前人所伏也軾式也所伏以式敬者也􅫜車中重薦也輕􅫜小貂也轂埆也體堅埆也轅援也車之大援也枕横在前如卧牀之有枕也枕横也横在下也薦板在上如薦席也齊人謂車枕以前曰縮言局縮也兗冀曰育御者坐中執御育育然也較在箱上為辜較也立人象人立也或曰陽門在前曰陽兩旁似門也槅枙}
