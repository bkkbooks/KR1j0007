  - {type: variant, offset: 480, length: 254, content: 名戶口也檄激也下官所以激迎其上之書文也檢禁也禁閉諸物使不得開露也璽徙也封物使可轉徙而不可發也印信也所以封物為信驗也亦言因也封物相因付也謁詣也詣告也書其姓名於上以告所至詣者也符付也書所勑命於上付使傳行之也亦言赴也執以赴君命也傳轉也轉移所在執以為信也劵綣也相約束繾綣以為限也莂別也大書中央中破別之也契刻也刻識其數也策書教令於上所以驅策諸下也漢制約勑封侯曰冊冊賾也勑使整賾不犯之也示示也過所過所至關津以示之也啟亦詣也以告語官司所至詣也書庶也紀庶物也亦言著也著之簡紙永不滅也畫挂也以五色挂物上也書書稱刺以筆刺紙簡之上, SBCK: 屐}
