body:
  text: 釋名第七卷釋用器第二十一斧甫也甫始也凡將制器始用斧代木已乃制之也鎌廉也體廉薄也其所刈稍稍取之又似廉者也斨戕也所伐皆戕毀也仇矛讎也所伐則平如討仇讎也錐利也椎推也耒亦推也鑿有所穿鑿也鐫鐏也有所鐏入也耜齒也似齒之斷物也犁利也利則發土絕草根也檀垣也摩之使垣然平也鋤助也去穢助苗長也齊人謂其柄曰橿橿然正直也頭曰鶴似鶴頭也枷加也加杖於柄頭以撾穗而出其穀也或曰羅枷三杖而用之也或曰丫丫杖轉於頭故以名之也鍤插也插地起土也或曰銷銷削也能有所穿削也或曰鏵鏵刳也刳地為坎也其板曰葉象木葉也杷播也所以播除物也亦言撥也撥使聚也耨似鋤嫗耨禾也鑮亦鋤類也鑮迫也迫地去草也𨪋溝也既割去壟上草又辟其土以壅苗根使壟下為溝受水潦也釱殺也言殺草也銍穫黍鐵也銍銍斷黍穗聲也釿謹也板廣不可得制削又有節則用此釿之所以詳謹令平滅斧跡也鐁斯彌也釿有高下之跡以此斯彌其上而平之也鋸倨也其體直所截應倨句之平也钃誅也主以誅除物根株也釋樂器第二十二鍾空也內空受氣多故聲大也磬罄也其聲罄罄然堅緻也鼓郭也張皮以冒之其中空也鞉導也所以導樂作也鼙裨也裨助鼓節也聲在前曰朔朔始也在後曰應應大鼓也所以懸鐘鼓者橫曰簨簨峻也在上高峻也從曰虡虡舉也在旁舉簨也簨上之板曰業刻為牙捷業如鋸齒也瑟施弦張之瑟瑟然也箏施弦高急箏箏然也筑以竹鼓之筑柲之也箜篌此師延所作靡靡之樂也後出於桑間濮上之地蓋空國之侯所存也師涓為晉平公鼓焉鄭衛分其地而有之遂號鄭衛之音謂之淫樂也枇杷本出於胡中馬上所鼓也推手前曰枇引手卻曰杷象其鼓時因以為名也塤喧也聲濁喧喧然也篪啼也聲從孔出如嬰兒啼聲也簫肅也其聲肅肅而清也笙生也竹之貫匏象物貫地而生也以瓠為之故曰匏也竽亦是也竽汙也其中汙空以受簧也簧橫也於管頭橫施於中也以竹鐵作於口橫鼓之亦是也搏拊以韋盛糠形如鼓以手附拍之也柷始見柷柷然也故訓為始以作樂也敔狀如伏虎敔衙也衙止也所以止樂也舂牘舂撞也牘築也以撞築地為節也籥躍也氣躍出也篴滌也其聲滌滌然也鐃聲鐃鐃也人聲曰歌歌柯也所歌之言是其質也以聲吟詠有上下如草木之有柯葉也故兗冀言歌聲如柯也竹曰吹吹推也以氣推發其聲也吟嚴也其聲本出於憂愁故其聲嚴肅使人聽之悽嘆也釋兵第二十三弓穹也張之穹隆然也其末曰簫言簫梢也又謂之弭以骨為之滑弭弭也中央曰弣弣撫也人所撫持也簫弣之間曰淵淵宛也言曲宛也弩怒也有勢怒也其柄曰臂似人臂也鉤絃者曰牙似齒牙也牙外曰郭為牙之規郭也下曰懸刀其形然也合名之曰機言如機之巧也亦言如門戶之樞機開闔有節也矢指也言其有所指向迅疾也又謂之箭前進也其本曰足矢形似木木以下為本以根為足也又謂之鏑鏑敵也可以禦敵也齊人謂之鏃鏃族也言其所中皆族滅也關西曰鉸鉸交也言有交刃也其體曰幹言梃幹也其旁曰羽如鳥羽也鳥須羽而飛矢須羽而前也齊人曰衛所以導衛矢也其末曰栝栝會也與弦會也栝旁曰叉形似叉也其受之器以皮曰箙謂柔服用之也織竹曰笮相迫笮之名也步叉人所帶以箭叉其中也馬上曰鞬鞬建也弓矢並建立其中也刀到也以斬伐到其所乃擊之也其末曰鋒言若蠭刺之毒利也其本曰環形似環也其室曰削削峭也其形峭殺裹刀體也室口之飾曰琫琫捧也捧束口也下末之飾曰琕琕卑也在下之言也短刀曰拍髀帶時拍髀旁也又曰露拍言露見也佩刀在佩旁之刀也或曰容刀有刀形而無刃備儀容而已剪刀剪進也所剪稍進前也書刀給書簡札有所刊削之刀也封刀鉸刀皆隨時名之也戟格也旁有枝格也戈句孑戟也戈過也所刺擣則決過所鉤引則制之弗得過也車戟曰常長丈六尺車上所持也八尺曰尋倍尋曰常故稱常也手戟手所持摘之戟也矛冒也刃下冒矜也下頭曰鐏鐏入地也松櫝長三尺其矜宜輕以松作之也櫝速獨也前剌之言也矛長丈八尺曰矟馬上所持言其矟矟便殺也又曰激矛激截也可以激截敵陣之矛也仇矛頭有三叉言可以討仇敵之矛也夷矛夷常也其矜長丈六尺不言常而曰夷者言其可夷滅敵亦車上所持也矛長九尺者也霍也所中霍然即破裂也殳殊也長丈二尺而無刃有所撞挃於車上使殊離也盾遯也跪其後避刃似隱遯也大而平者曰吳魁本出於吳為魁帥者所持也隆者曰須盾本出於蜀須所持也或曰羗盾言出於羗也約脅而鄒者曰陷虜言可以陷破虜敵也今謂之曰露見是也狹而長者曰步盾步兵所持與刀相配者也狹而短者曰孑盾車上所持者也孑小稱也以縫編板謂之木絡以犀皮作之曰犀盾以木作之曰木盾皆因所用為名也鼓排彭旁也在旁排敵禦攻也鎧猶塏也塏堅重之言也或謂之甲似物孚甲以自禦也劍檢也所以防檢非常也又斂也其在身拱時歛在臂內也其旁鼻曰鐔鐔尋也帶所貫尋也其末曰鋒鋒末之言也鋋延也延達也去此至彼之言也鉤鑲兩頭曰鉤中央曰鑲或推鑲或鉤引用之之宜也九旗之名日月為常畫日月於其端天子所建言常明也交龍為旂旂倚也畫作兩龍相依倚也諸侯所建也通帛為旃旃戰也戰戰恭己而已也通以赤色為之無文采三孤所建象無事也熊虎為旗軍將所建象其猛如熊虎與眾期其下也鳥隼為旟旟譽也軍吏所建急疾趨事則有稱譽也雜帛為物以雜色綴其邊為翅尾也將帥所建象物雜也龜蛇為旐旐兆也龜蛇知氣兆之吉凶建之於後察度事宜之形兆也全羽為𣄧𣄧猶滑也順滑之貌也析羽為旌旌精也有精光也緌有虞氏之旌也注旄竿首其形橤橤然也或曰綏夏后氏之旌也其形衰衰也白斾殷旌也以帛繼旐末也翿陶也其貌陶陶下垂也幢童也其貌童童然也旛幡也其貌幡幡然也校號也將帥號令之所在也節為號令賞罰之節也鐸度也號令之限度也金鼓金禁也為進退之禁也戚慼也斧以斬斷見者皆慼懼也銊豁也所向莫敢當前豁然破散也釋車第二十四車古者曰車聲如居言行所以居人也今曰車車舍也行者所處若居舍也天子所乘曰玉輅以玉飾車也輅亦車也謂之輅者言行於道路也象輅金輅革輅木輅各隨所以為飾名之也鉤車以行為陣鉤股曲直有正夏所制也胡奴車東胡以罪沒入為官奴者引之殷所制也元戎車元戎在軍前啟突敵陣周所制也輦車人所輦也柏車柏伯也伯大也丁夫服任之大車也羊車羊祥也祥善也善飾之車今犢車是也墨車漆之正黑如墨無文飾大夫所乘也重較其較重卿所乘也役車給役之車也棧車棧靖也庥靖物之車也皆庶人所乘也軘車戎者所乘也容車婦人所載小車也其蓋施帷所以隱蔽其形容也衣車前戶所以載衣服之車也獵車所乘以畋獵也小車駕馬輕小之車也駕馬宜輕故使之局小也高車其蓋高立載之車也安車蓋卑坐乘今吏所乘小車也驘車羔車各以所駕名之也檻車上施欄檻以格猛獸亦囚禁罪人之車也軺車軺遙也遙遠也四向遠望之車也輜車載輜重臥息其中之車也輜廁也所載衣物雜廁其中也軿車軿屏也四面屏蔽婦人所乘牛車也輜軿之形同有邸曰輜無邸曰軿輈句也轅上句也衡橫也橫馬頸上也游環環在服馬背上驂馬之外轡貫之游移前卻無常處也脅驅在服馬外脅也陰蔭也橫側車前以蔭笭也靷所以引車也鋈沃也冶白金以沃灌靷環也續續靷端也文鞇車中所坐者也用虎皮有文采鞇因也因與下轝相連著也𩊙伏也在前人所伏也軾式也所伏以式敬者也靯𩍿車中重薦也輕靯𩍿小貂也轂埆也體堅埆也轅援也車之大援也桄橫在前如臥床之有桄也桄橫也橫在下也薦板在上如薦席也齊人謂車桄以前曰縮言局縮也兗冀曰育御者坐中執御育育然也較在箱上為辜較也立人象人立也或曰陽門在前曰陽兩旁似門也槅扼也所以扼牛頸也馬曰烏啄下向又馬頸似烏開口向下啄物時也隆強言體隆而強也或曰車弓似弓曲也其上竹曰郎䟽相遠晶晶然也𨏴複也重複非一之言也輞罔也罔羅周輪之外也關西曰輮言曲輮也或曰䡑䡑緜也緜連其外也輪綸也言彌綸也周匝之言也𨍉言輻總入轂中也輿舉也軸抽也入轂中可抽出也釭空也其中空也鐧間也間釭軸之間使不相摩也轄害也車之禁害也輠裹也裹軹頭也軹指也如指而見於轂頭也笭橫在車前織竹作之孔笭也蓋在上覆蓋人也軬藩也蔽水雨也轑蓋叉也如屋構橑也杠公也眾叉所公共也䡟棿猶祕齧也在車軸上正輪之祕齧前卻也屐似人屐也又曰伏兔在軸上似之也又曰輹輹伏也伏於軸上也鉤心從輿心下鉤軸也縛在車下與輿相連縛也棠𨅨也在車兩旁𨅨幰使不得進卻也幰憲也所以禦熱也紲制也牽制之也紛放也防其放弛以拘之也轡咈也牽引咈戾以制馬也勒絡也絡其頭而引之也御在口中之言也鏕苞也所以在旁苞歛其口也鞅嬰也喉下稱嬰亦言纓絡之也其下飾曰樊纓其形樊樊而上屬纓也韅經也橫經其腹下也靽半也拘使半行不得自縱也羇檢也所以檢持制之也韁疆也繫之使不得出疆限也鞧遒也在後遒道使不得卻縮也負在背上之言也𩉥懸也所以懸縛軛也釋船第二十五船循也循水而行也又曰舟言周流也其前立柱曰椳椳巍也巍巍高貌也其尾曰柂柂拖也在後見拖曳也且弼正船使順流不使他戾也在旁曰櫓櫓膂也用膂力然後舟行也引舟者曰筰筰作也作起也起舟使動行也在旁撥水曰櫂櫂濯也濯於水中也且言使舟擢進也又謂之札形似札也又謂之楫楫捷也撥水使舟捷疾也所用斥旁岸曰交一人前一人還相交錯也隨風張幔曰帆帆泛也使舟疾汎汎然也舟中床以薦物者曰笭言但有簀如笭床也南方人謂之笭突言濕漏之水𥥛然從下過也其上板曰覆言所覆慮也其上屋曰廬象廬舍也其上重室曰飛廬在上故曰飛也又在上曰爵室於中候望之如鳥雀之警示也軍行在前曰先登登之向敵陣也狹而長曰艨衝以衝突敵船也輕疾者曰赤馬其體正赤疾如馬也上下重床曰艦四方施板以禦矢石其內如牢檻也五百斛以上環有小屋曰斥候以視敵進退也三百斛曰𦩍𦩍貂也貂短也江南所名短而廣安不傾危者也二百斛以下曰艇其形徑挺一人二人所行也
